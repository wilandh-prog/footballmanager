const F442=[
  [R.GK,0.04,0.50],[R.DEF,0.16,0.85],[R.DEF,0.16,0.62],[R.DEF,0.16,0.38],[R.DEF,0.16,0.15],
  [R.MID,0.38,0.88],[R.MID,0.38,0.62],[R.MID,0.38,0.38],[R.MID,0.38,0.12],
  [R.FWD,0.72,0.58],[R.FWD,0.72,0.42],
];
const F433=[
  [R.GK,0.04,0.50],[R.DEF,0.16,0.85],[R.DEF,0.16,0.62],[R.DEF,0.16,0.38],[R.DEF,0.16,0.15],
  [R.MID,0.38,0.72],[R.MID,0.35,0.50],[R.MID,0.38,0.28],
  [R.FWD,0.78,0.85],[R.FWD,0.78,0.50],[R.FWD,0.78,0.15],
];

// ===================== GAME =====================
const ST={PRE:'pre',KO:'ko',PLAY:'play',GOAL:'goal',GK_HOLD:'gkhold',
  GOALKICK:'gk2',THROWIN:'ti',CORNER:'crn',FREEKICK:'fk',PENALTY:'pen',
  HALF:'half',FULL:'full'};

class Game {
  constructor(){
    this.ball=new Ball();
    this.ball._game=this;
    this.teams=[
      new Team('Blue','#4a9eff','#2a6ecf',F442,1),
      new Team('Red','#ff4a4a','#cf2a2a',F433,-1),
    ];
    this.state=ST.PRE; this.stateT=0; this.half=1;
    this.gameTime=0; this.speed=1.5; this.paused=false;
    this.restartTeam=null; this.restartPos=null;
    this.message=''; this.lastGoalTeam=null;
    // Tactical state
    this.possTeam=null; this.possChangeT=0; this.counterTeam=null;
    this.setPieceTaker=null;
    // Defensive transition
    this.defTransTeam=null; this.defTransTimer=0;
    // Event log
    this.events=[];
    this.prepKO(0);
  }

  teamCls(team){ return team===this.teams[0]?'ev1':'ev2'; }
  pStr(p){ const c=this.teamCls(p.team); return `<span class="${c}">#${p.num} ${p.team.name}</span>`; }
  addEvent(html){
    const ft=this.gameTime*(45/HALF_DUR);
    const ts=`${String(Math.floor(ft)).padStart(2,'0')}:${String(Math.floor((ft%1)*60)).padStart(2,'0')}`;
    this.events.unshift({ts,html});
    if(this.events.length>40) this.events.pop();
  }

  all(){return[...this.teams[0].players,...this.teams[1].players];}
  getOpps(team){return team===this.teams[0]?this.teams[1].players:this.teams[0].players;}
  teamWithBall(){
    if(this.ball.owner) return this.ball.owner.team;
    if(this.ball.lastOwner) return this.ball.lastOwner.team;
    return null;
  }
  isCounter(team){ return this.counterTeam===team && this.possChangeT>0; }
  scoreDiff(team){
    const other=team===this.teams[0]?this.teams[1]:this.teams[0];
    return team.score-other.score;
  }
  timeLeft(){ return HALF_DUR*2-this.gameTime; }
  // Ball progress from a team's perspective (0=own goal, 1=opp goal)
  ballProg(team){ return team.atkDir>0 ? this.ball.pos.x/PW : 1-this.ball.pos.x/PW; }
  isDefTransition(team){ return this.defTransTeam===team && this.defTransTimer>0; }

  prepKO(ti){
    this.ball.reset(PW/2,PH/2);
    this.teams[0].resetPositions(true,ti===0);
    this.teams[1].resetPositions(true,ti===1);
    this.state=ST.KO; this.stateT=KICKOFF_WAIT; this.koTeam=ti;
  }

  update(dt){
    if(this.paused) return;
    dt*=this.speed;
    this.stateT-=dt;

    switch(this.state){
      case ST.KO:
        // Let players settle into kickoff positions during wait
        for(const p of this.all()){
          if(p.targetPos && p.pos.dist(p.targetPos) > 0.5){
            p.moveToward(p.targetPos, p.maxSpd*0.4, dt);
          }
        }
        if(this.stateT<=0){
          // Ensure ball is at center and snap the taker to it
          this.ball.reset(PW/2, PH/2);
          const ks=this.teams[this.koTeam].players.filter(p=>p.role===R.FWD);
          const k=ks.reduce((a,b)=>a.pos.dist(this.ball.pos)<b.pos.dist(this.ball.pos)?a:b);
          k.pos=new V(PW/2+this.teams[this.koTeam].atkDir*0.5, PH/2);
          k.facing=new V(this.teams[this.koTeam].atkDir, 0); // Face attack direction
          k.kickCD=0.5; // Delay before first kick
          k.dtimer=0.8; // Delay before first decision
          this.ball.owner=k; k.hasBall=true; this.ball.lastOwner=k;
          this.state=ST.PLAY; this.message='';
        }
        break;

      case ST.PLAY:
        this.gameTime+=dt;
        this.updatePlay(dt);
        if(this.gameTime>=HALF_DUR && this.half===1) this.doHalf();
        else if(this.gameTime>=HALF_DUR*2 && this.half===2) this.doFull();
        break;

      case ST.GOAL:
        // Players walk back to kickoff positions
        this.ball.pos.set(PW/2,PH/2);
        for(const p of this.all()){
          if(p.targetPos) p.moveToward(p.targetPos, p.maxSpd*0.6, dt);
        }
        if(this.stateT<=0){
          const kt=this.lastGoalTeam===this.teams[0]?1:0;
          this.prepKO(kt);
        }
        break;

      case ST.GK_HOLD:
        this.ball.update(dt);
        this.updatePositions(dt);
        this.checkGoals(); // ball can cross line while GK holds
        if(this.state===ST.GK_HOLD && this.stateT<=0) this.state=ST.PLAY;
        break;

      case ST.GOALKICK: if(this.stateT<=0) this.execGoalKick(); break;

      case ST.THROWIN: case ST.CORNER: case ST.FREEKICK: case ST.PENALTY:
        // Players move to set piece positions during setup
        for(const p of this.all()){
          if(p.targetPos){
            const spd=p.role===R.GK?SPD_GK:p.maxSpd*0.8;
            p.moveToward(p.targetPos, spd, dt);
          }
        }
        if(this.stateT<=0){
          if(this.state===ST.THROWIN) this.execThrowIn();
          else if(this.state===ST.CORNER) this.execCorner();
          else if(this.state===ST.FREEKICK) this.execFreeKick();
          else if(this.state===ST.PENALTY) this.execPenalty();
        }
        break;

      case ST.HALF: if(this.stateT<=0) this.startHalf2(); break;
    }
  }

  updatePlay(dt){
    // Track possession changes for counter-attack AND defensive transition
    const twb=this.teamWithBall();
    if(twb && twb!==this.possTeam){
      if(this.possTeam && twb!==this.possTeam){
        this.counterTeam=twb;
        this.possChangeT=COUNTER_WINDOW;
        // Team that LOST the ball enters defensive transition
        this.defTransTeam=this.possTeam;
        this.defTransTimer=DEF_TRANSITION_WINDOW;
      }
      this.possTeam=twb;
    }
    if(this.possChangeT>0) this.possChangeT-=dt; else this.counterTeam=null;
    if(this.defTransTimer>0) this.defTransTimer-=dt; else this.defTransTeam=null;

    this.ball.update(dt);
    for(const p of this.all()) p.update(dt,this);
    this.handleInteract(dt);
    this.checkGoals();
    if(this.state===ST.PLAY) this.checkOOB();
  }

  updatePositions(dt){
    for(const p of this.all()){
      if(!p.hasBall){
        p.targetPos=p.basePosition(this.ball, this.teamWithBall()===p.team);
      }
      p.update(dt,this);
    }
  }

  handleInteract(dt){
    const ball=this.ball;
    if(ball.justKicked>0) return;

    // Aerial ball handling: trap (control) or header
    if(!ball.owner && ball.z > 0.5){
      for(const p of this.all()){
        if(p.kickCD>0) continue;
        const d=p.pos.dist(ball.pos);
        if(d>2.0) continue;

        if(ball.isHeadable()){
          // Ball is high (2.0-3.5m) — must head it
          const nearGoal = p.pos.dist(p.atkGoal()) < 20;
          if(nearGoal && p.role!==R.GK){
            // Attacking header toward goal
            const gdir=p.atkGoal().sub(p.pos).norm();
            ball.vel=gdir.mul(12+rand(0,5));
            ball.vz=rand(-3,-0.5);
          } else {
            // Defensive clear / cushion header
            ball.vel=p.facing.mul(6+rand(0,4));
            ball.vz=rand(0,3);
          }
          ball.z=Math.max(ball.z, 1.5);
          ball.owner=null; ball.lastOwner=p; ball.lastKicker=p;
          ball.justKicked=0.2; p.kickCD=0.4;
          return;
        }

        if(ball.isTrappable()){
          // Volley opportunity near goal?
          if(p.role!==R.GK && p.pos.dist(p.atkGoal())<20){
            const ss=p.evalShoot(this);
            if(ss>5){
              // Volley!
              const gp=p.atkGoal();
              const ty=PH/2+rand(-GOAL_W/2+0.5,GOAL_W/2-0.5);
              const dir=new V(gp.x,ty).sub(p.pos);
              ball.z=0; ball.vz=0;
              ball.kick(dir.norm(), SHOT_LO+rand(0,8), rand(0,1.5));
              ball.lastOwner=p; ball.lastKicker=p;
              p.hasBall=false; p.kickCD=0.4;
              return;
            }
          }
          // Normal trap — chest/thigh control
          ball.z=0; ball.vz=0;
          const nearOppTrap = p.oppDist(p.pos, this);
          const trapPressure = clamp(1 - (nearOppTrap - 2) / 6, 0, 1);
          // Clean trap when unpressured, messier under pressure
          const trapQuality = clamp(1 - trapPressure * 0.6 - (1-p.stamina)*0.2, 0.2, 1);
          ball.vel=ball.vel.mul(0.08 + 0.12 * (1-trapQuality)); // good trap = more dead ball
          ball.owner=p; p.hasBall=true;
          ball.lastOwner=p;
          p.dtimer=0.15;
          p.kickCD=FIRST_TOUCH_BASE_CD + trapPressure * FIRST_TOUCH_PRESSURE_CD * 0.5 + (1-p.stamina)*STAMINA_TOUCH_PENALTY*0.3;
          return;
        }
      }
      // Ball in air but no one close enough — skip ground control
      if(ball.z > TRAP_Z_MAX) return;
    }

    // Find closest player to ball (ground control)
    // Players running in the same direction as ball get extended reach
    let closestD=CONTROL_R, closest=null;
    for(const p of this.all()){
      if(p.kickCD>0) continue;
      // GK: shots (fast balls toward goal) are handled probabilistically by checkGKSave, not auto-grab
      if(p.role===R.GK && ball.vel.len()>=8){
        const toGoal=p.defGoal().sub(ball.pos);
        if(toGoal.dot(ball.vel)>=0) continue;
      }
      const d=p.pos.dist(ball.pos);
      // Bonus reach when moving in same direction as ball (chasing it down)
      let effectiveR = CONTROL_R;
      if(ball.vel.len()>2 && p.vel.len()>1){
        const dirMatch = ball.vel.norm().dot(p.vel.norm());
        if(dirMatch > 0.5) effectiveR += 0.5 * dirMatch; // up to +0.5m bonus
      }
      if(d<effectiveR && d<closestD){closestD=d;closest=p;}
    }

    if(ball.owner){
      // Tackling
      const opps=this.getOpps(ball.owner.team);
      for(const o of opps){
        if(o.role===R.GK && o.pos.dist(o.defGoal())>15) continue;
        const d=o.pos.dist(ball.owner.pos);
        const tackleLv = upg(o, 'tackle');
        const tackleChance = TACKLE_PCT * (1 + tackleLv*0.36) * o.wcStr;
        if(d<TACKLE_R && Math.random()<tackleChance){
          // Foul check
          if(Math.random()<FOUL_PCT){
            this.callFoul(ball.owner, o);
            return;
          }
          // Clean tackle
          const tackled=ball.owner;
          ball.owner.hasBall=false;
          const dir=o.facing.clone();
          ball.kick(dir, 3+Math.random()*3);
          ball.lastOwner=o; ball.lastKicker=null;
          ball.justKicked=0.2;
          this.addEvent(`Tackle: ${this.pStr(o)} on ${this.pStr(tackled)}`);
          break;
        }
      }
    } else if(closest){
      closest.hasBall=true;
      ball.owner=closest;
      ball.lastOwner=closest;

      // === FIRST TOUCH QUALITY ===
      const nearOppFT = closest.oppDist(closest.pos, this);
      const pressure = clamp(1 - (nearOppFT - 2) / 6, 0, 1);
      const staminaPenalty = (1 - closest.stamina) * STAMINA_TOUCH_PENALTY * 0.4;
      const touchCD = FIRST_TOUCH_BASE_CD + pressure * FIRST_TOUCH_PRESSURE_CD + staminaPenalty;

      // Slow ball = easier to control, fast ball = harder
      const ballSpeedFactor = clamp((ball.vel.len() - 4) / 12, 0, 1); // 0 for slow balls, 1 for fast

      // Bad first touch: only under heavy pressure AND fast ball
      if (pressure > 0.6 && ballSpeedFactor > 0.3 && closest.role !== R.GK) {
        const displaceChance = pressure * 0.3 * ballSpeedFactor * (1 - closest.stamina * 0.3);
        if (Math.random() < displaceChance) {
          const displaceDir = new V(rand(-1,1), rand(-1,1)).norm();
          const displaceDist = FIRST_TOUCH_DISPLACE * pressure * (0.3 + rand(0, 0.4));
          ball.kick(displaceDir, displaceDist * 1.5, 0);
          closest.hasBall = false;
          ball.owner = null;
          closest.kickCD = touchCD * 0.6 + 0.06;
          return;
        }
      }

      // Human queued first-time shot
      if(humanControl.queuedShot && humanControl.enabled && closest.team === humanControl.team && closest.role !== R.GK){
        const held = (performance.now() - humanControl.spaceDownTime) / 1000;
        const charge = clamp(held / 1.0, 0.15, 1.0);
        humanControl.queuedShot = false;
        humanControl.charging = false;
        closest.shoot(this, charge);
        return;
      }

      // First-time finish: shoot immediately if in good position
      if(closest.role!==R.GK && closest.distAtkGoal()<22){
        const ss=closest.evalShoot(this);
        if(ss>8){ closest.shoot(this); return; }
      }
      // One-touch pass: if under pressure or in counter, play it quick
      const inCounter = game.isCounter(closest.team);
      if(closest.role!==R.GK && (nearOppFT<5 || inCounter)){
        const {target:pt, score:ps, aimPos:pa}=closest.evalPass(this);
        const touchThreshold = inCounter ? 3 : 6;
        if(pt && ps>touchThreshold){ closest.pass(pt, this, pa); return; }
      }

      humanControl.queuedShot = false;
      closest.dtimer=0.08;
      closest.kickCD=touchCD;
    }

    this.checkGKSave();
  }

  checkGKSave(){
    const ball=this.ball;
    if(ball.owner) return;
    const spd=ball.vel.len();
    if(spd<8) return;
    if(ball.pos.x<=0||ball.pos.x>=PW) return; // already past goal line — let checkGoals decide

    for(const team of this.teams){
      const gk=team.players[0];
      const gc=gk.defGoal();
      const toGoal=gc.sub(ball.pos);
      if(toGoal.dot(ball.vel)<0) continue;

      const d=gk.pos.dist(ball.pos);
      if(d<GK_DIVE){
        const diff=d/GK_DIVE;
        const shotLvGK = ball.lastKicker ? upg(ball.lastKicker, 'shot') : 0;
        const prob=GK_SAVE_BASE-diff*0.3-spd*0.008-shotLvGK*0.09;
        if(Math.random()<Math.max(prob,0.04)){
          ball.vel.set(0,0); ball.z=0; ball.vz=0;
          ball.owner=gk; gk.hasBall=true;
          gk.facing=new V(gk.team.atkDir,0); // face field so ball offset stays in bounds
          ball.lastOwner=gk; ball.lastKicker=null;
          gk.kickCD=GK_HOLD_T;
          this.state=ST.GK_HOLD; this.stateT=GK_HOLD_T;
          this.addEvent(`Save: ${this.pStr(gk)}`);
          if(typeof playSfx!=='undefined') playSfx(sfxCheer1);
          return;
        }
      }
    }
  }

  checkGoals(){
    const b=this.ball, by=b.pos.y;
    const inG=by>PH/2-GOAL_W/2 && by<PH/2+GOAL_W/2;
    const underBar = b.z < 2.44; // goal height is 2.44m
    if(b.pos.x<=0 && inG && underBar){
      const sc=this.teams.find(t=>t.atkDir===-1);
      if(sc){ this.scoreGoal(sc); return; }
    }
    if(b.pos.x>=PW && inG && underBar){
      const sc=this.teams.find(t=>t.atkDir===1);
      if(sc){ this.scoreGoal(sc); return; }
    }
    // Ball over the bar - goal kick
    if((b.pos.x<=0 || b.pos.x>=PW) && inG && !underBar && b.z >= 2.44){
      const atLeft=b.pos.x<=0;
      const defTeam=this.teams.find(t=>(t.atkDir>0)===atLeft);
      if(defTeam){
        this.restartTeam=defTeam;
        this.restartPos=new V(atLeft?GOAL_AREA_D:PW-GOAL_AREA_D, PH/2);
        b.vel.set(0,0); b.z=0; b.vz=0; b.pos=this.restartPos.clone();
        this.state=ST.GOALKICK; this.stateT=RESTART_WAIT;
        for(const p of this.all()) p.hasBall=false; b.owner=null;
      }
    }
  }

  scoreGoal(team){
    team.score++;
    this.state=ST.GOAL; this.stateT=GOAL_WAIT;
    this.message='GOAL!'; this.lastGoalTeam=team;
    if(typeof playSfx!=='undefined'){sfxCheer1.pause();sfxCheer1.currentTime=0;playSfx(sfxCheer2);}
    CG.happytime();
    const scorer=this.ball.lastOwner;
    const cls=this.teamCls(team);
    const scorerStr=scorer?` ${this.pStr(scorer)}`:'';
    this.addEvent(`<span class="ev-goal">GOAL!</span>${scorerStr} <span class="${cls}">${team.name}</span>`);
    this.ball.pos.set(PW/2, PH/2); // Move ball to center immediately
    this.ball.owner=null; this.ball.vel.set(0,0); this.ball.z=0; this.ball.vz=0;
    for(const p of this.all()) p.hasBall=false;

    // Set targets to kickoff positions so players walk back
    const kt=team===this.teams[0]?1:0;
    for(const t of this.teams){
      const hasKO=t===this.teams[kt];
      for(const p of t.players){
        let pos=t.f2w(p.formPos);
        if(t.atkDir>0) pos.x=Math.min(pos.x,PW/2-2);
        else pos.x=Math.max(pos.x,PW/2+2);
        if(hasKO && p.role===R.FWD){
          pos=new V(PW/2+t.atkDir*1, PH/2+(p.formPos.y<0.5?-1.5:1.5));
        }
        p.targetPos=pos;
      }
    }
  }

  checkOOB(){
    const b=this.ball;
    if(b.owner) return;

    // Sidelines
    if(b.pos.y<0||b.pos.y>PH){
      const lt=b.lastOwner?b.lastOwner.team:this.teams[0];
      const tt=lt===this.teams[0]?this.teams[1]:this.teams[0];
      this.restartTeam=tt;
      this.restartPos=new V(clamp(b.pos.x,1,PW-1), b.pos.y<0?1:PH-1);
      b.vel.set(0,0); b.z=0; b.vz=0; b.pos=this.restartPos.clone();
      this.state=ST.THROWIN; this.stateT=THROWIN_SETUP;
      for(const p of this.all()) p.hasBall=false; b.owner=null;
      this.setupThrowIn();
      return;
    }

    // End lines
    if(b.pos.x<0||b.pos.x>PW){
      const atLeft=b.pos.x<0;
      // Safety net: if ball is inside goal area and under the bar, it's a goal
      const inGoal=b.pos.y>PH/2-GOAL_W/2 && b.pos.y<PH/2+GOAL_W/2 && b.z<2.44;
      if(inGoal){
        const sc=this.teams.find(t=>atLeft ? t.atkDir<0 : t.atkDir>0);
        if(sc){ this.scoreGoal(sc); return; }
      }

      const lt=b.lastOwner?b.lastOwner.team:this.teams[0];
      const defTeam=this.teams.find(t=>(t.atkDir>0)===atLeft);
      if(!defTeam) return;

      if(lt===defTeam){
        // Corner
        const atkTeam=lt===this.teams[0]?this.teams[1]:this.teams[0];
        this.restartTeam=atkTeam;
        this.restartPos=new V(atLeft?1:PW-1, b.pos.y<PH/2?1:PH-1);
        this.state=ST.CORNER;
        this.stateT=CORNER_SETUP;
        const cc=this.teamCls(atkTeam);
        this.addEvent(`Corner: <span class="${cc}">${atkTeam.name}</span>`);
      } else {
        // Goal kick
        this.restartTeam=defTeam;
        this.restartPos=new V(atLeft?GOAL_AREA_D:PW-GOAL_AREA_D, PH/2);
        this.state=ST.GOALKICK;
        this.stateT=RESTART_WAIT;
        const gc=this.teamCls(defTeam);
        this.addEvent(`Goal kick: <span class="${gc}">${defTeam.name}</span>`);
      }
      b.vel.set(0,0); b.z=0; b.vz=0; b.pos=this.restartPos.clone();
      for(const p of this.all()) p.hasBall=false; b.owner=null;
      if(this.state===ST.CORNER) this.setupCorner();
    }
  }

  // ===================== FOUL SYSTEM =====================
  callFoul(fouledPlayer, fouler){
    const ball=this.ball;
    const foulPos=fouledPlayer.pos.clone();
    fouledPlayer.hasBall=false;
    ball.owner=null; ball.vel.set(0,0); ball.z=0; ball.vz=0;
    ball.pos=foulPos.clone();
    for(const p of this.all()) p.hasBall=false;

    this.restartTeam=fouledPlayer.team;
    this.restartPos=foulPos;

    // Check if foul is in the penalty box (the box the fouled team attacks)
    const atkGoalX=fouledPlayer.team.atkDir>0?PW:0;
    const inBoxX=fouledPlayer.team.atkDir>0
      ? foulPos.x>PW-PENALTY_D : foulPos.x<PENALTY_D;
    const inBoxY=foulPos.y>(PH-PENALTY_W)/2 && foulPos.y<(PH+PENALTY_W)/2;

    if(inBoxX && inBoxY){
      // PENALTY
      this.restartPos=new V(fouledPlayer.team.atkDir>0?PW-PENALTY_SPOT:PENALTY_SPOT, PH/2);
      ball.pos=this.restartPos.clone();
      this.state=ST.PENALTY; this.stateT=PENALTY_SETUP;
      this.message='PENALTY!';
      this.setupPenalty();
      this.addEvent(`<span class="ev-pen">PENALTY!</span> ${this.pStr(fouler)} fouled ${this.pStr(fouledPlayer)}`);
    } else {
      // FREE KICK
      this.state=ST.FREEKICK; this.stateT=FREEKICK_SETUP;
      this.setupFreeKick();
      this.addEvent(`Foul: ${this.pStr(fouler)} on ${this.pStr(fouledPlayer)}`);
    }
  }

  // ===================== SET PIECE SETUP =====================
  setupCorner(){
    const atk=this.restartTeam;
    const def=atk===this.teams[0]?this.teams[1]:this.teams[0];
    const goalX=atk.atkDir>0?PW:0;
    const cornerTop=this.restartPos.y<PH/2;
    const inward=atk.atkDir>0?-1:1;
    const nearSide=cornerTop?-1:1; // -1=top, 1=bottom

    // Corner taker: pick a wide MID, or nearest MID/FWD
    const widePlayers=atk.players.filter(p=>(p.role===R.MID||p.role===R.FWD)&&p.role!==R.GK);
    const taker=widePlayers.reduce((a,b)=>a.pos.dist(this.restartPos)<b.pos.dist(this.restartPos)?a:b);
    taker.targetPos=this.restartPos.clone();
    this.setPieceTaker=taker;

    // Expanded attacking positions: load the box with 11 spots
    const boxX4=goalX+inward*4;   // 4m from goal line
    const boxX6=goalX+inward*6;   // 6m from goal line
    const boxX8=goalX+inward*8;   // 8m out
    const penX=goalX+inward*PENALTY_SPOT;
    const edgeX=goalX+inward*(PENALTY_D+2);

    const atkSpots=[
      // Prime scoring positions (6 spots)
      new V(boxX4, PH/2+nearSide*(-GOAL_W/2-1)),  // near post (front)
      new V(boxX4, PH/2+nearSide*(GOAL_W/2+1)),    // far post
      new V(boxX6, PH/2),                          // central 6m
      new V(penX,  PH/2-2),                         // penalty spot left
      new V(penX,  PH/2+2),                         // penalty spot right
      new V(boxX8, PH/2+nearSide*(-3)),             // 6-yard box area
      // Secondary positions (5 spots)
      new V(boxX8, PH/2+nearSide*6),                // back post run zone
      new V(boxX8, PH/2),                           // central edge of 6-yard
      new V(edgeX, PH/2+rand(-6,6)),                // edge of box (clearances)
      new V(edgeX, PH/2+nearSide*(-8)),             // wide edge
      new V(edgeX+inward*5, PH/2+nearSide*(-10)),   // deep recycling option
    ];

    // Everyone except GK and 1 defender attacks (9 players forward)
    const atkGK=atk.players[0];
    const atkDefs=atk.players.filter(p=>p.role===R.DEF);
    const stayBack=atkDefs[0]; // 1 defender stays for counter-defense

    const atkField=atk.players.filter(p=>p!==taker&&p!==atkGK&&p!==stayBack);
    const sorted=[
      ...atkField.filter(p=>p.role===R.FWD),
      ...atkField.filter(p=>p.role===R.DEF),
      ...atkField.filter(p=>p.role===R.MID),
    ];

    for(let i=0;i<sorted.length;i++){
      if(i<atkSpots.length){
        sorted[i].targetPos=atkSpots[i];
      } else {
        sorted[i].targetPos=new V(edgeX+inward*6, PH/2+rand(-12,12));
      }
    }

    // GK stays at base, 1 defender stays deeper
    atkGK.targetPos=atkGK.basePosition(this.ball,true);
    if(stayBack) stayBack.targetPos=new V(goalX-inward*25, PH/2);

    // Defending: GK on line, 2 on posts, rest man-mark in the box
    const defGK=def.players[0];
    defGK.targetPos=new V(goalX-inward*1, PH/2+nearSide*1);
    const defField=def.players.filter(p=>p!==defGK);

    // Post defenders
    const defSpots=[
      new V(goalX-inward*0.5, PH/2-GOAL_W/2+0.5),  // near post defender
      new V(goalX-inward*0.5, PH/2+GOAL_W/2-0.5),  // far post defender
    ];
    // Rest man-mark the attackers in the box (goalside)
    for(let i=0;i<Math.min(atkSpots.length, sorted.length);i++){
      const gs=new V(goalX,PH/2).sub(atkSpots[i]).norm().mul(1.2);
      defSpots.push(atkSpots[i].add(gs));
    }

    for(let i=0;i<defField.length;i++){
      if(i<defSpots.length){
        defField[i].targetPos=defSpots[i];
      } else {
        defField[i].targetPos=new V(edgeX, PH/2+rand(-10,10));
      }
    }
  }

  setupThrowIn(){
    const atk=this.restartTeam;
    const def=atk===this.teams[0]?this.teams[1]:this.teams[0];
    const fwd=atk.atkDir;
    const infield=this.restartPos.y<PH/2?1:-1; // direction toward center of pitch
    const bx=this.restartPos.x, by=this.restartPos.y;

    // Thrower: nearest DEF or MID (fullbacks/wide mids take throw-ins)
    const thrower=atk.players.filter(p=>p.role!==R.GK)
      .reduce((a,b)=>a.pos.dist(this.restartPos)<b.pos.dist(this.restartPos)?a:b);
    thrower.targetPos=this.restartPos.clone();
    this.setPieceTaker=thrower;

    // In attacking third? More players push forward. In own third? Keep shape.
    const atkProg=fwd>0?bx/PW:1-bx/PW;
    const inFinalThird=atkProg>0.65;

    const tms=atk.players.filter(p=>p!==thrower&&p.role!==R.GK)
      .sort((a,b)=>a.pos.dist(this.restartPos)-b.pos.dist(this.restartPos));

    for(let i=0;i<tms.length;i++){
      if(i===0){
        // Short: close along the touchline, slightly ahead
        tms[i].targetPos=new V(bx+fwd*3, by+infield*5);
      } else if(i===1){
        // Infield: angled inside
        tms[i].targetPos=new V(bx+fwd*2, by+infield*12);
      } else if(i===2){
        // Ahead: further up the line
        tms[i].targetPos=new V(bx+fwd*12, by+infield*4);
      } else if(i===3 && inFinalThird){
        // Final third: get in behind
        tms[i].targetPos=new V(bx+fwd*18, PH/2+rand(-6,6));
      } else {
        tms[i].targetPos=tms[i].basePosition(this.ball,true);
      }
      tms[i].targetPos.x=clamp(tms[i].targetPos.x,2,PW-2);
      tms[i].targetPos.y=clamp(tms[i].targetPos.y,3,PH-3);
    }
    atk.players[0].targetPos=atk.players[0].basePosition(this.ball,true);

    // Defending: mark nearby throw-in options, rest hold zone
    const opps=def.players.filter(p=>p.role!==R.GK);
    for(const p of opps){
      const d=p.pos.dist(this.restartPos);
      if(d<20){
        // Stay near their mark but goalside
        const base=p.basePosition(this.ball,false);
        const toBall=this.restartPos.sub(base).norm();
        p.targetPos=base.add(toBall.mul(Math.min(3,d*0.3)));
      } else {
        p.targetPos=p.basePosition(this.ball,false);
      }
    }
    def.players[0].targetPos=def.players[0].basePosition(this.ball,false);
  }

  setupFreeKick(){
    const atk=this.restartTeam;
    const def=atk===this.teams[0]?this.teams[1]:this.teams[0];
    const goalX=atk.atkDir>0?PW:0;
    const goalPos=new V(goalX,PH/2);
    const distToGoal=this.restartPos.dist(goalPos);
    const nearGoal=distToGoal<30;
    const inward=atk.atkDir>0?-1:1;
    const ballSide=this.restartPos.y<PH/2?-1:1;

    // Kicker
    const kicker=atk.players.filter(p=>p.role===R.MID||p.role===R.FWD)
      .reduce((a,b)=>a.pos.dist(this.restartPos)<b.pos.dist(this.restartPos)?a:b);
    const behindBall=this.restartPos.add(goalPos.sub(this.restartPos).norm().mul(-2));
    kicker.targetPos=behindBall;
    this.setPieceTaker=kicker;

    if(nearGoal){
      // WALL: 3-5 defenders at 9.15m from ball
      const ballToGoal=goalPos.sub(this.restartPos).norm();
      const wallCenter=this.restartPos.add(ballToGoal.mul(WALL_DIST));
      const wallPerp=new V(-ballToGoal.y, ballToGoal.x);
      const wallSize=distToGoal<18?5:distToGoal<24?4:3;

      const defField=def.players.filter(p=>p.role!==R.GK)
        .sort((a,b)=>a.pos.dist(this.restartPos)-b.pos.dist(this.restartPos));
      const wallPlayers=[];
      for(let i=0;i<defField.length&&wallPlayers.length<wallSize;i++){
        const offset=(wallPlayers.length-(wallSize-1)/2)*0.9;
        defField[i].targetPos=wallCenter.add(wallPerp.mul(offset));
        wallPlayers.push(defField[i]);
      }

      // Defending GK: offset to see around wall
      const defGK=def.players[0];
      const wallSide=this.restartPos.y<PH/2?1:-1;
      defGK.targetPos=new V(goalX-atk.atkDir*1.5, PH/2+wallSide*2);

      // 6 attacking spots in/around the box
      const atkSpots=[
        new V(goalX+inward*4, PH/2-GOAL_W/2-1),         // near post (top)
        new V(goalX+inward*4, PH/2+GOAL_W/2+1),         // far post (bottom)
        new V(goalX+inward*PENALTY_SPOT, PH/2-2),        // penalty spot left
        new V(goalX+inward*PENALTY_SPOT, PH/2+2),        // penalty spot right
        new V(goalX+inward*8, PH/2+ballSide*(-5)),       // pulling away from ball side
        new V(goalX+inward*(PENALTY_D+3), PH/2+rand(-5,5)), // edge of box
      ];

      // Prioritize FWDs and DEFs (CBs) for box, MIDs at edge
      const atkField=atk.players.filter(p=>p!==kicker&&p.role!==R.GK);
      const atkSorted=[
        ...atkField.filter(p=>p.role===R.FWD),
        ...atkField.filter(p=>p.role===R.DEF),
        ...atkField.filter(p=>p.role===R.MID),
      ];
      for(let i=0;i<atkSorted.length;i++){
        if(i<atkSpots.length){
          atkSorted[i].targetPos=atkSpots[i];
        } else {
          atkSorted[i].targetPos=new V(goalX+inward*(PENALTY_D+8), PH/2+rand(-12,12));
        }
      }

      // Non-wall defenders: mark attackers in the box
      const nonWall=defField.filter(p=>!wallPlayers.includes(p));
      for(let i=0;i<nonWall.length;i++){
        if(i<atkSpots.length-1){
          // Mark corresponding attacker, goalside
          const gs=new V(goalX,PH/2).sub(atkSpots[i]).norm().mul(1.2);
          nonWall[i].targetPos=atkSpots[i].add(gs);
        } else {
          nonWall[i].targetPos=new V(goalX+inward*(PENALTY_D-2), PH/2+rand(-8,8));
        }
      }
    } else {
      // Far from goal: everyone to base positions, but push attackers higher
      const atkField=atk.players.filter(p=>p!==kicker&&p.role!==R.GK);
      for(const p of atkField){
        const base=p.basePosition(this.ball,true);
        // Push FWDs/MIDs slightly more forward
        if(p.role===R.FWD||p.role===R.MID) base.x+=atk.atkDir*5;
        base.x=clamp(base.x,3,PW-3);
        p.targetPos=base;
      }
      for(const p of def.players) p.targetPos=p.basePosition(this.ball,false);
    }
    atk.players[0].targetPos=atk.players[0].basePosition(this.ball,true);
  }

  setupPenalty(){
    const atk=this.restartTeam;
    const def=atk===this.teams[0]?this.teams[1]:this.teams[0];
    const goalX=atk.atkDir>0?PW:0;
    const inward=atk.atkDir>0?-1:1;

    // Kicker: best FWD
    const kicker=atk.players.filter(p=>p.role===R.FWD)
      .reduce((a,b)=>a.distAtkGoal()<b.distAtkGoal()?a:b);
    kicker.targetPos=this.restartPos.add(new V(inward*2.5, 0));
    this.setPieceTaker=kicker;

    // GK on the line
    const defGK=def.players[0];
    defGK.targetPos=new V(goalX-inward*0.5, PH/2);

    // Attackers line up on the penalty arc edges (ready to pounce on rebound)
    const arcX=atk.atkDir>0?PW-PENALTY_D:PENALTY_D;
    const atkOthers=atk.players.filter(p=>p!==kicker&&p.role!==R.GK);
    for(let i=0;i<atkOthers.length;i++){
      const side=i%2===0?-1:1;
      const spread=PENALTY_W/2-4-i*2;
      atkOthers[i].targetPos=new V(arcX+inward*(-1), PH/2+side*clamp(spread,3,PENALTY_W/2-2));
      atkOthers[i].targetPos.y=clamp(atkOthers[i].targetPos.y,3,PH-3);
    }
    atk.players[0].targetPos=atk.players[0].basePosition(this.ball,true);

    // Defenders line up on the opposite edges of the penalty arc
    const defOthers=def.players.filter(p=>p!==defGK);
    for(let i=0;i<defOthers.length;i++){
      const side=i%2===0?1:-1;
      const spread=PENALTY_W/2-3-i*2;
      defOthers[i].targetPos=new V(arcX+inward*(-1), PH/2+side*clamp(spread,3,PENALTY_W/2-2));
      defOthers[i].targetPos.y=clamp(defOthers[i].targetPos.y,3,PH-3);
    }
  }

  execGoalKick(){
    const gk=this.restartTeam.players[0];
    this.ball.pos=this.restartPos.clone();
    this.ball.owner=gk; gk.hasBall=true;
    gk.pos=this.restartPos.clone();
    gk.kickCD=0.8; // Delay before GK can kick
    gk.dtimer=1.0; // Delay before GK makes decision
    this.ball.lastOwner=gk;
    this.state=ST.GK_HOLD; this.stateT=1.0; // Longer hold time
  }

  execThrowIn(){
    const thrower=this.setPieceTaker||this.restartTeam.players.filter(p=>p.role!==R.GK)
      .reduce((a,b)=>a.pos.dist(this.restartPos)<b.pos.dist(this.restartPos)?a:b);
    thrower.pos=this.restartPos.clone();
    const opps=this.getOpps(this.restartTeam);

    // Find best target: score by space, forward progress, and distance
    const targets=this.restartTeam.players.filter(p=>p!==thrower&&p.role!==R.GK);
    let best=null, bs=-Infinity;
    for(const t of targets){
      const d=thrower.pos.dist(t.pos);
      if(d<3||d>30) continue;
      let s=0;
      // Space around target
      let nearOpp=Infinity;
      for(const o of opps) nearOpp=Math.min(nearOpp,o.pos.dist(t.pos));
      s+=nearOpp*2;
      // Forward bonus
      const fwd=this.restartTeam.atkDir>0?t.pos.x-thrower.pos.x:thrower.pos.x-t.pos.x;
      s+=fwd*0.5;
      // Prefer short options that are open
      if(d<12 && nearOpp>4) s+=5;
      // Passing lane check
      for(const o of opps) if(ptSegDist(o.pos,thrower.pos,t.pos)<2) s-=15;
      s+=rand(-2,2);
      if(s>bs){bs=s;best=t;}
    }

    if(best){
      const d=best.pos.sub(this.restartPos);
      const dist=d.len();
      const pwr=clamp(8+dist*0.3,8,16);
      const lead=best.vel.mul(dist/pwr*0.3);
      // Long throws get slight loft
      const loft=dist>15?rand(1,2.5):0;
      this.ball.pos=this.restartPos.clone();
      this.ball.kick(d.norm().add(lead.norm().mul(0.3)).norm(), pwr, loft);
      this.ball.lastOwner=thrower; this.ball.lastKicker=thrower;
      this.ball.justKicked=0.4; // Delay before anyone can touch ball
    }
    this.message='';
    this.state=ST.PLAY;
  }

  execCorner(){
    const taker=this.setPieceTaker;
    if(taker) taker.pos=this.restartPos.clone();
    const goalX=this.restartTeam.atkDir>0?PW:0;
    const inward=this.restartTeam.atkDir>0?-1:1;
    const cornerTop=this.restartPos.y<PH/2;

    // 15% chance of short corner
    if(Math.random()<0.15){
      const tms=this.restartTeam.players.filter(p=>p!==taker&&p.role!==R.GK);
      const near=tms.reduce((a,b)=>a.pos.dist(this.restartPos)<b.pos.dist(this.restartPos)?a:b);
      if(near && near.pos.dist(this.restartPos)<15){
        const d=near.pos.sub(this.restartPos);
        this.ball.pos=this.restartPos.clone();
        this.ball.kick(d, clamp(8+d.len()*0.4,8,14));
        this.ball.lastOwner=taker; this.ball.lastKicker=taker;
        this.ball.justKicked=0.4; // Delay before anyone can touch ball
        this.state=ST.PLAY; this.message='';
        return;
      }
    }

    // Cross delivery variation
    const deliveryType=Math.random();
    let tx, ty, pwr;
    if(deliveryType<0.35){
      // Near post: fast, flatter
      tx=goalX+inward*5;
      ty=cornerTop?PH/2-GOAL_W/2-1:PH/2+GOAL_W/2+1;
      pwr=20;
    } else if(deliveryType<0.7){
      // Far post: high, looping
      tx=goalX+inward*6;
      ty=cornerTop?PH/2+GOAL_W/2+2:PH/2-GOAL_W/2-2;
      pwr=17;
    } else {
      // Penalty spot area: central
      tx=goalX+inward*PENALTY_SPOT;
      ty=PH/2+rand(-3,3);
      pwr=18;
    }

    const tgt=new V(tx,ty);
    const d=tgt.sub(this.restartPos);
    const dist=d.len();
    const flightTime=dist/pwr;
    const loft=0.5*GRAVITY*flightTime+rand(1,3);
    this.ball.pos=this.restartPos.clone();
    this.ball.kick(d, pwr, loft);
    this.ball.lastOwner=taker; this.ball.lastKicker=taker;
    this.ball.justKicked=0.5; // Delay for corner delivery
    this.state=ST.PLAY; this.message='';
  }

  execFreeKick(){
    const kicker=this.setPieceTaker;
    if(kicker) kicker.pos=this.restartPos.add(new V(-this.restartTeam.atkDir*2,0));
    const goalX=this.restartTeam.atkDir>0?PW:0;
    const goalPos=new V(goalX,PH/2);
    const distToGoal=this.restartPos.dist(goalPos);

    this.ball.pos=this.restartPos.clone();

    if(distToGoal<30){
      // DIRECT SHOT at goal
      const choice=Math.random();
      if(choice<0.55){
        // Shoot around the wall: aim to one side
        const side=Math.random()<0.5?-1:1;
        const targetY=PH/2+side*rand(GOAL_W/4, GOAL_W/2-0.3);
        const target=new V(goalX,targetY);
        const dir=target.sub(this.restartPos).norm();
        const pwr=rand(SHOT_LO+2, SHOT_HI-2);
        // Slight curl (bend) by adding perpendicular offset
        const curl=side*rand(0.02,0.06);
        const kickDir=dir.add(new V(-dir.y*curl, dir.x*curl)).norm();
        const loft=rand(0.5,2.0); // keep it low-ish
        this.ball.kick(kickDir, pwr, loft);
        this.ball.justKicked=0.5; // Delay for free kick
      } else if(choice<0.85){
        // Chip over the wall: higher loft
        const targetY=PH/2+rand(-GOAL_W/2+0.5, GOAL_W/2-0.5);
        const target=new V(goalX,targetY);
        const dir=target.sub(this.restartPos).norm();
        const pwr=rand(SHOT_LO, SHOT_HI-4);
        const flightTime=distToGoal/pwr;
        const loft=0.5*GRAVITY*flightTime+rand(1,2.5); // high enough to clear wall
        this.ball.kick(dir, pwr, loft);
        this.ball.justKicked=0.5; // Delay for free kick
      } else {
        // Cross/pass to teammate in box
        const tms=this.restartTeam.players.filter(p=>p!==kicker&&p.role!==R.GK);
        const inBox=tms.filter(p=>Math.abs(p.pos.x-goalX)<PENALTY_D+3);
        if(inBox.length>0){
          const t=inBox[Math.floor(Math.random()*inBox.length)];
          const dir=t.pos.sub(this.restartPos);
          const dist=dir.len();
          const pwr2=clamp(10+dist*0.4,PASS_LO,PASS_HI);
          const ft=dist/pwr2;
          const loft2=0.5*GRAVITY*ft+rand(0.5,2);
          this.ball.kick(dir, pwr2, loft2);
          this.ball.justKicked=0.5; // Delay for free kick
        } else {
          // Fallback: shoot
          const dir=goalPos.sub(this.restartPos).norm();
          this.ball.kick(dir, rand(SHOT_LO,SHOT_HI), rand(0.5,2));
          this.ball.justKicked=0.5; // Delay for free kick
        }
      }
      this.ball.lastOwner=kicker; this.ball.lastKicker=kicker;
    } else {
      // FAR FROM GOAL: pass to best teammate
      const tms=this.restartTeam.players.filter(p=>p!==kicker&&p.role!==R.GK);
      const opps=this.getOpps(this.restartTeam);
      let best=null, bs=-Infinity;
      for(const t of tms){
        const d=this.restartPos.dist(t.pos);
        if(d<5||d>45) continue;
        let s=0;
        let nearOpp=Infinity;
        for(const o of opps) nearOpp=Math.min(nearOpp,o.pos.dist(t.pos));
        s+=nearOpp*2;
        const fwd=this.restartTeam.atkDir>0?t.pos.x-this.restartPos.x:this.restartPos.x-t.pos.x;
        s+=fwd*0.6;
        for(const o of opps) if(ptSegDist(o.pos,this.restartPos,t.pos)<2) s-=15;
        if(s>bs){bs=s;best=t;}
      }
      if(best){
        const dir=best.pos.sub(this.restartPos);
        const dist=dir.len();
        const pwr=clamp(PASS_LO+dist*0.4,PASS_LO,PASS_HI);
        let loft=0;
        if(dist>LOFT_DIST){
          const ft=dist/pwr;
          loft=0.5*GRAVITY*ft+rand(0,1.5);
        }
        this.ball.kick(dir, pwr, loft);
        this.ball.justKicked=0.5; // Delay for free kick
      } else {
        // Fallback: punt forward
        const dir=goalPos.sub(this.restartPos).norm();
        this.ball.kick(dir, 16, rand(1,3));
        this.ball.justKicked=0.5; // Delay for free kick
      }
      this.ball.lastOwner=kicker; this.ball.lastKicker=kicker;
    }
    this.state=ST.PLAY; this.message='';
  }

  execPenalty(){
    const kicker=this.setPieceTaker;
    const goalX=this.restartTeam.atkDir>0?PW:0;
    const def=this.restartTeam===this.teams[0]?this.teams[1]:this.teams[0];
    const defGK=def.players[0];

    // Position kicker at ball
    if(kicker) kicker.pos=this.restartPos.add(new V(-this.restartTeam.atkDir*1.5,0));

    // Kicker picks a side
    const side=Math.random()<0.5?-1:1;
    const targetY=PH/2+side*rand(1.5, GOAL_W/2-0.3);
    const target=new V(goalX, targetY);
    const dir=target.sub(this.restartPos).norm();
    const pwr=rand(SHOT_LO+4, SHOT_HI);
    // Slight inaccuracy (can miss ~5% of the time)
    const inacc=rand(-0.04,0.04);
    const kickDir=dir.add(new V(0,inacc)).norm();
    const loft=rand(0, 1.8); // mostly low

    this.ball.pos=this.restartPos.clone();
    this.ball.kick(kickDir, pwr, loft);
    this.ball.lastOwner=kicker; this.ball.lastKicker=kicker;
    this.ball.justKicked=0.6; // Delay for penalty kick
    if(kicker){ kicker.hasBall=false; kicker.kickCD=0.5; }

    // GK dives: picks a side (33% correct guess)
    const gkDiveSide=Math.random()<0.33?side:(Math.random()<0.5?-side:0);
    const diveTarget=new V(goalX, PH/2+gkDiveSide*rand(2,GOAL_W/2));
    defGK.targetPos=diveTarget;

    this.state=ST.PLAY; this.message='';
  }

  doHalf(){
    this.state=ST.HALF; this.stateT=3; this.message='HALF TIME';
    this.ball.vel.set(0,0); this.ball.z=0; this.ball.vz=0; this.ball.owner=null;
    for(const p of this.all()){ p.hasBall=false; p.stamina=clamp(p.stamina+0.3,0,1); }
    this.addEvent(`--- Half time ${this.teams[0].score}-${this.teams[1].score} ---`);
  }

  startHalf2(){
    this.half=2;
    this.teams[0].switchSides(); this.teams[1].switchSides();
    this.message='';
    this.prepKO(this.koTeam===0?1:0);
  }

  doFull(){
    this.state=ST.FULL; this.message='FULL TIME';
    this.ball.vel.set(0,0); this.ball.z=0; this.ball.vz=0; this.ball.owner=null;
    for(const p of this.all()) p.hasBall=false;
    this.addEvent(`--- Full time ${this.teams[0].score}-${this.teams[1].score} ---`);
  }
}

// ===================== STAR HELPERS =====================
function drawStarShape(c, cx, cy, outerR, innerR, nPts, rot) {
  c.beginPath();
  for (let i = 0; i < nPts*2; i++) {
    const a = rot + i*Math.PI/nPts - Math.PI/2;
    const r = i%2===0 ? outerR : innerR;
    i===0 ? c.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r)
           : c.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
  }
  c.closePath();
}

function drawOrbitStars(c, cx, cy, t, numStars, orbitR, outerR, innerR, color, speed) {
  c.fillStyle = color;
  for (let i=0; i<numStars; i++) {
    const angle = t*speed + i*Math.PI*2/numStars;
    const sx = cx + Math.cos(angle)*orbitR;
    const sy = cy + Math.sin(angle)*orbitR;
    drawStarShape(c, sx, sy, outerR, innerR, 4, angle);
    c.fill();
  }
}

// ===================== RENDERER =====================
class Renderer {
  constructor(canvas,game){
    this.c=canvas; this.ctx=canvas.getContext('2d'); this.game=game;
    this.s=1; this.ox=0; this.oy=0;
    this.trailMap=new Map();
    this.resize();
    window.addEventListener('resize',()=>this.resize());
  }
  resize(){
    const uiH=document.getElementById('ui').offsetHeight;
    let w,h;
    if(window.innerWidth<=700){
      const panelH=Math.min(Math.max(Math.floor(window.innerHeight*0.38),180),290);
      w=window.innerWidth; h=Math.max(window.innerHeight-uiH-panelH,120);
    } else {
      const leftW=document.getElementById('left-col').offsetWidth;
      w=window.innerWidth-leftW; h=window.innerHeight-uiH;
    }
    this.c.width=w; this.c.height=h;
    this.s=Math.min(w/(PW+4), h/(PH+4));
    this.ox=(w-PW*this.s)/2; this.oy=(h-PH*this.s)/2;
  }
  ts(x,y){return[this.ox+x*this.s, this.oy+y*this.s];}
  tw(sx,sy){return[(sx-this.ox)/this.s,(sy-this.oy)/this.s];}

  draw(){
    const c=this.ctx, s=this.s;
    c.fillStyle='#2d8a4e'; c.fillRect(0,0,this.c.width,this.c.height);
    this.drawPitch(c,s);
    this.drawPlayers(c,s);
    this.drawBallTrail(c,s);
    this.drawBall(c,s);
  }

  drawPitch(c,s){
    const [ox,oy]=this.ts(0,0);
    const pw=PW*s, ph=PH*s;

    // Grass
    c.fillStyle='#2d8a4e';
    c.fillRect(ox-4*s,oy-4*s,pw+8*s,ph+8*s);

    // Stripes
    const sw=PW/10;
    for(let i=0;i<10;i+=2){
      c.fillStyle='rgba(255,255,255,0.03)';
      const [sx]=this.ts(i*sw,0);
      c.fillRect(sx,oy,sw*s,ph);
    }

    c.strokeStyle='rgba(255,255,255,0.7)';
    c.lineWidth=Math.max(1.5,s*0.12);

    // Outline
    c.strokeRect(ox,oy,pw,ph);

    // Half line
    const [hx]=this.ts(PW/2,0);
    c.beginPath();c.moveTo(hx,oy);c.lineTo(hx,oy+ph);c.stroke();

    // Center circle + spot
    const [cx,cy]=this.ts(PW/2,PH/2);
    c.beginPath();c.arc(cx,cy,CENTER_R*s,0,Math.PI*2);c.stroke();
    c.fillStyle='rgba(255,255,255,0.7)';
    c.beginPath();c.arc(cx,cy,0.3*s,0,Math.PI*2);c.fill();

    // Both ends
    for(const side of[0,1]){
      const gx=side===0?0:PW;

      // Penalty area
      const [pax,pay]=this.ts(side===0?0:PW-PENALTY_D,(PH-PENALTY_W)/2);
      c.strokeRect(pax,pay,PENALTY_D*s,PENALTY_W*s);

      // Goal area
      const [gax,gay]=this.ts(side===0?0:PW-GOAL_AREA_D,(PH-GOAL_AREA_W)/2);
      c.strokeRect(gax,gay,GOAL_AREA_D*s,GOAL_AREA_W*s);

      // Penalty spot
      const [psx,psy]=this.ts(side===0?PENALTY_SPOT:PW-PENALTY_SPOT,PH/2);
      c.beginPath();c.arc(psx,psy,0.25*s,0,Math.PI*2);c.fill();

      // Penalty arc
      const acx2=side===0?PENALTY_SPOT:PW-PENALTY_SPOT;
      const [acx,acy]=this.ts(acx2,PH/2);
      const sa=side===0?-0.93:Math.PI-0.93, ea=side===0?0.93:Math.PI+0.93;
      c.beginPath();c.arc(acx,acy,CENTER_R*s,sa,ea);c.stroke();

      // Goal
      const [g1x,g1y]=this.ts(gx,PH/2-GOAL_W/2);
      c.fillStyle='rgba(255,255,255,0.15)';
      c.fillRect(g1x-(side===0?GOAL_DEPTH*s:0),g1y,GOAL_DEPTH*s,GOAL_W*s);
      c.strokeStyle='rgba(255,255,255,0.9)';
      c.lineWidth=Math.max(2,s*0.2);
      const nx=side===0?g1x-GOAL_DEPTH*s:g1x;
      c.beginPath();c.moveTo(g1x,g1y);c.lineTo(nx,g1y);c.lineTo(nx,g1y+GOAL_W*s);c.lineTo(g1x,g1y+GOAL_W*s);c.stroke();
      c.strokeStyle='rgba(255,255,255,0.7)';
      c.lineWidth=Math.max(1.5,s*0.12);

      // Corner arcs
      for(const cy2 of[0,PH]){
        const [ccx,ccy]=this.ts(gx,cy2);
        const sa2=side===0?(cy2===0?0:-Math.PI/2):(cy2===0?Math.PI/2:Math.PI);
        c.beginPath();c.arc(ccx,ccy,CORNER_R*s,sa2,sa2+Math.PI/2);c.stroke();
      }
    }
  }

  drawPlayers(c,s){
    for(const team of this.game.teams){
      for(const p of team.players){
        const [px,py]=this.ts(p.pos.x,p.pos.y);
        const r=PLAYER_R*s;

        const t = this.game.gameTime;
        const spdLv    = upg(p,'speed');
        const shotLv   = upg(p,'shot');
        const tackleLv = upg(p,'tackle');
        const stamLv   = upg(p,'stamina');

        // ── SPEED: static shimmer + comet trail ─────────────────
        if (spdLv > 0) {
          if (!this.trailMap.has(p)) this.trailMap.set(p, []);
          const trail = this.trailMap.get(p);
          const spd = p.vel.len();
          const moving = spd > 1.5;
          const maxTrail = 5 + spdLv*5; // 10/15/20 points at lv 1/2/3
          if (moving) { trail.unshift({x:px,y:py}); if(trail.length>maxTrail) trail.pop(); }
          else if (trail.length) trail.pop();

          if (trail.length > 1) {
            // Comet tail: white core fading to electric blue
            for (let i=0; i<trail.length; i++) {
              const f = 1 - i/trail.length;
              const a = f * 0.9 * (spdLv/5);
              const sz = Math.max(r*(1.1-i*0.13), 2);
              const g = Math.floor(180+75*f);   // 255→180 white→blue
              const b2 = 255;
              c.fillStyle = `rgba(${Math.floor(200+55*f)},${g},${b2},${a.toFixed(2)})`;
              c.beginPath(); c.arc(trail[i].x, trail[i].y, sz, 0, Math.PI*2); c.fill();
            }
          }
        }

        // ── TACKLE: yellow stars, fast orbit ────────────────────
        if (tackleLv > 0)
          drawOrbitStars(c, px, py, t, tackleLv, r+10, 3.5, 1.5, 'rgba(255,230,0,0.92)', 2.8);

        // ── STAMINA: green stars, slow outer orbit ───────────────
        if (stamLv > 0)
          drawOrbitStars(c, px, py, t, stamLv, r+14, 3.5, 1.5, 'rgba(50,255,100,0.92)', 0.9);

        // ── SHOT: orange stars, medium orbit ────────────────────
        if (shotLv > 0)
          drawOrbitStars(c, px, py, t, shotLv, r+12, 4, 2, 'rgba(255,120,0,0.95)', 1.8);

        // Shadow
        c.fillStyle='rgba(0,0,0,0.3)';
        c.beginPath();c.ellipse(px+1,py+2,r*0.9,r*0.5,0,0,Math.PI*2);c.fill();

        // Body
        c.fillStyle=team.color;
        c.beginPath();c.arc(px,py,r,0,Math.PI*2);c.fill();
        c.strokeStyle=team.colorDk;
        c.lineWidth=Math.max(1,s*0.1);
        c.stroke();

        // Human control indicator
        if(humanControl.isControlled(p)){
          c.strokeStyle='#00ff88';
          c.lineWidth=Math.max(2,s*0.18);
          c.beginPath();c.arc(px,py,r+4,0,Math.PI*2);c.stroke();
          // Direction arrow
          const fLen=r+8;
          c.strokeStyle='rgba(0,255,136,0.6)';
          c.lineWidth=Math.max(1.5,s*0.12);
          c.beginPath();
          c.moveTo(px,py);
          c.lineTo(px+p.facing.x*fLen,py+p.facing.y*fLen);
          c.stroke();
          // Shot power bar
          if(humanControl.charging && p.hasBall){
            const held=(performance.now()-humanControl.spaceDownTime)/1000;
            const charge=Math.min(held/1.0,1.0);
            const barW=r*3, barH=Math.max(3,s*0.25);
            const bx2=px-barW/2, by2=py-r-10;
            c.fillStyle='rgba(0,0,0,0.5)';
            c.fillRect(bx2,by2,barW,barH);
            const col=charge<0.7?`rgb(${Math.floor(charge/0.7*255)},255,0)`:`rgb(255,${Math.floor((1-charge)*255*3)},0)`;
            c.fillStyle=col;
            c.fillRect(bx2,by2,barW*charge,barH);
            c.strokeStyle='#fff';c.lineWidth=1;
            c.strokeRect(bx2,by2,barW,barH);
          }
        }

        // Number
        c.fillStyle='#fff';
        c.font=`bold ${Math.max(9,r*1.1)}px sans-serif`;
        c.textAlign='center';c.textBaseline='middle';
        c.fillText(p.num,px,py+0.5);

        // Ball indicator
        if(p.hasBall){
          c.strokeStyle='#ffff00';
          c.lineWidth=Math.max(1.5,s*0.14);
          c.beginPath();c.arc(px,py,r+2.5,0,Math.PI*2);c.stroke();
        }
      }
    }
  }

  drawBallTrail(c,s){
    const b=this.game.ball;
    const shotLv = b.lastKicker ? upg(b.lastKicker,'shot') : 0;
    if (!this.ballTrail) this.ballTrail=[];
    const [bx,by]=this.ts(b.pos.x,b.pos.y);
    const zPx = b.z * s * 0.9;
    const actualY = by - zPx; // match the real drawn ball position
    const fast = b.vel.len()>8 && !b.owner;
    const maxLen = shotLv>0 ? 6+shotLv*5 : 0; // 11/16/21 trail points by level
    if (shotLv>0 && fast) {
      this.ballTrail.unshift({x:bx, y:actualY, lv:shotLv});
      if(this.ballTrail.length>maxLen) this.ballTrail.pop();
    } else if (this.ballTrail.length) {
      this.ballTrail.pop();
    }
    for (let i=0;i<this.ballTrail.length;i++){
      const bt=this.ballTrail[i];
      const f=1-i/this.ballTrail.length;
      const a=f*0.85*(bt.lv/3);
      const sz=Math.max(BALL_R*s*(1.5-i*0.06), 1.5);
      const g=Math.floor(Math.max(0,180-i*12));
      c.fillStyle=`rgba(255,${g},0,${a.toFixed(2)})`;
      c.beginPath(); c.arc(bt.x,bt.y,sz,0,Math.PI*2); c.fill();
    }
  }

  drawBall(c,s){
    const b=this.game.ball;
    const [bx,by]=this.ts(b.pos.x,b.pos.y);
    const r=BALL_R*s;
    const zPx = b.z * s * 0.9; // vertical offset in pixels
    const zScale = 1 + b.z * 0.04; // ball looks slightly bigger when high

    // Shadow on the ground (gets smaller/lighter when ball is high)
    const shadowAlpha = Math.max(0.1, 0.4 - b.z * 0.04);
    const shadowScale = Math.max(0.3, 1 - b.z * 0.06);
    c.fillStyle=`rgba(0,0,0,${shadowAlpha})`;
    c.beginPath();
    c.ellipse(bx+1, by+2, r*0.9*shadowScale, r*0.5*shadowScale, 0, 0, Math.PI*2);
    c.fill();

    // Ball drawn offset upward by height
    const drawY = by - zPx;
    const drawR = r * zScale;
    c.fillStyle='#fff';
    c.beginPath();c.arc(bx, drawY, drawR, 0, Math.PI*2);c.fill();
    c.strokeStyle = b.z > 1 ? '#bbb' : '#888';
    c.lineWidth=Math.max(0.5, s*0.05);
    c.stroke();

    // Height indicator line when ball is significantly airborne
    if(b.z > 1.5){
      c.strokeStyle=`rgba(255,255,255,${Math.min(0.3, b.z*0.05)})`;
      c.setLineDash([2,3]);
      c.beginPath();c.moveTo(bx, by);c.lineTo(bx, drawY);c.stroke();
      c.setLineDash([]);
    }
  }

  getPlayerAt(sx,sy){
    const [wx,wy]=this.tw(sx,sy);
    for(const t of this.game.teams)
      for(const p of t.players)
        if(p.pos.dist(new V(wx,wy))<PLAYER_R*1.5) return p;
    return null;
  }
}

// ===================== HUMAN CONTROL =====================
const humanControl = {
  enabled: false,
  team: null,
  player: null,
  keys: {},
  prevBallOwner: null,
  queuedShot: false,
  spaceDownTime: 0,
  charging: false,

  init(game) {
    this.team = game.teams[0];
    this.selectNearestToBall(game);
  },

  selectNearestToBall(game) {
    const ball = game.ball;
    let best = null, bd = Infinity;
    for (const p of this.team.players) {
      if (p.role === R.GK) continue;
      const d = p.pos.dist(ball.pos);
      if (d < bd) { bd = d; best = p; }
    }
    if (best) this.player = best;
  },

  switchPlayer(game) {
    const ball = game.ball;
    const candidates = this.team.players.filter(p => p !== this.player && p.role !== R.GK);
    candidates.sort((a, b) => a.pos.dist(ball.pos) - b.pos.dist(ball.pos));
    if (candidates.length > 0) this.player = candidates[0];
  },

  getDirection() {
    let dx = 0, dy = 0;
    if (this.keys['KeyW'] || this.keys['ArrowUp']) dy = -1;
    if (this.keys['KeyS'] || this.keys['ArrowDown']) dy = 1;
    if (this.keys['KeyA'] || this.keys['ArrowLeft']) dx = -1;
    if (this.keys['KeyD'] || this.keys['ArrowRight']) dx = 1;
    if (dx === 0 && dy === 0) return null;
    return new V(dx, dy).norm();
  },

  isControlled(player) {
    return this.enabled && this.player === player;
  },

  autoSwitch(game) {
    if (!this.enabled || !this.team) return;
    const ball = game.ball;
    // Auto-switch when teammate gets ball
    if (ball.owner && ball.owner !== this.prevBallOwner) {
      if (ball.owner.team === this.team && ball.owner !== this.player && ball.owner.role !== R.GK) {
        this.player = ball.owner;
      }
    }
    // Auto-switch to nearest outfield player when ball is loose
    if (!ball.owner && (!this.player.hasBall)) {
      this.selectNearestToBall(game);
    }
    this.prevBallOwner = ball.owner;
  }
};

// Human control: keyboard input
document.addEventListener('keydown', (e) => {
  humanControl.keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Tab'].includes(e.code)) {
    e.preventDefault();
  }
  if (!humanControl.enabled || !humanControl.player) return;
  if (game.state !== ST.PLAY) return;

  const p = humanControl.player;
  if (e.code === 'Space') {
    if (!p.hasBall && !game.ball.owner) {
      humanControl.queuedShot = true;
      humanControl.spaceDownTime = performance.now();
    }
    if (p.hasBall && !humanControl.charging) {
      humanControl.charging = true;
      humanControl.spaceDownTime = performance.now();
    }
  }
  if ((e.code === 'KeyE' || e.code === 'KeyQ') && p.hasBall && p.kickCD <= 0) {
    const lob = e.code === 'KeyQ';
    const facing = p.facing;
    const opps = game.getOpps(p.team);
    let best = null, bs = -Infinity;
    for (const t of p.team.players) {
      if (t === p || t.role === R.GK) continue;
      const toT = t.pos.sub(p.pos);
      const d = toT.len();
      if (d < 4 || d > 50) continue;
      const dir = toT.norm();
      // How aligned is this teammate with the player's facing direction
      const dot = facing.dot(dir); // -1 behind, +1 directly ahead
      let s = dot * 20; // strong directional weight
      // Pass lane safety
      let blocked = false;
      for (const o of opps) {
        if (ptSegDist(o.pos, p.pos, t.pos) < 1.8) { blocked = true; break; }
      }
      if (blocked) s -= 30;
      // Space around target
      let nearOpp = Infinity;
      for (const o of opps) nearOpp = Math.min(nearOpp, o.pos.dist(t.pos));
      s += Math.min(nearOpp, 8) * 1.5;
      // Forward progress toward goal
      const fwd = p.team.atkDir > 0 ? t.pos.x - p.pos.x : p.pos.x - t.pos.x;
      s += fwd * 0.5;
      // Prefer reasonable distances
      if (d > 35) s -= (d - 35) * 0.5;
      // Slight anti-pingpong
      if (game.ball.lastKicker === t) s -= 8;
      if (s > bs) { bs = s; best = t; }
    }
    if (best) {
      if (lob) {
        const aim = best.pos;
        const d = p.pos.dist(aim);
        const pwr = clamp(PASS_LO + d * 0.4, PASS_LO, PASS_HI);
        const lead = best.vel.mul(d / pwr * 0.5);
        const finalAim = aim.add(lead);
        const dir = finalAim.sub(p.pos).norm();
        const flightTime = d / pwr;
        const loftV = 0.5 * GRAVITY * flightTime + rand(1, 3);
        game.ball.kick(dir, pwr, loftV);
        p.hasBall = false;
        game.ball.lastOwner = p; game.ball.lastKicker = p;
        p.kickCD = 0.3;
      } else {
        p.pass(best, game, null);
      }
    }
  }
  if (e.code === 'Tab') {
    humanControl.switchPlayer(game);
  }
});
document.addEventListener('keyup', (e) => {
  humanControl.keys[e.code] = false;
  if (e.code === 'Space' && humanControl.charging) {
    humanControl.charging = false;
    const p = humanControl.player;
    if (p && p.hasBall && p.kickCD <= 0 && game.state === ST.PLAY) {
      const held = (performance.now() - humanControl.spaceDownTime) / 1000;
      const charge = clamp(held / 1.0, 0.05, 1.0); // 0-1 over 1 second
      p.shoot(game, charge);
    }
  }
});

function wcPoisson(l){let L=Math.exp(-l),k=0,p=1;do{k++;p*=Math.random();}while(p>L);return k-1;}
function wcQSim(sA,sB){const d=(sA-sB)/100;return{ga:wcPoisson(Math.max(0.2,1.35+d*2.5)),gb:wcPoisson(Math.max(0.2,1.35-d*2.5))};}
function wcStat(idx,gf,ga){const s=wc.stats[idx];s.gf+=gf;s.ga+=ga;if(gf>ga){s.w++;s.pts+=3;}else if(gf===ga){s.d++;s.pts++;}else s.l++;}
function wcStand(g){return[...wc.groups[g]].sort((a,b)=>{const sa=wc.stats[a],sb=wc.stats[b];if(sb.pts!==sa.pts)return sb.pts-sa.pts;const gda=sa.gf-sa.ga,gdb=sb.gf-sb.ga;if(gdb!==gda)return gdb-gda;return sb.gf-sa.gf;});}

function wcCurMD(){
  for(let md=0;md<3;md++){const u=[];for(let g=0;g<12;g++)for(let m=md*2;m<md*2+2;m++)if(!wc.gm[g][m].played)u.push({g,m});if(u.length)return{md:md+1,matches:u};}
  return null;
}
function wcBuildKO(){
  const st=Array.from({length:12},(_,i)=>wcStand(i));
  const winners=st.map(s=>s[0]);
  const runners=st.map(s=>s[1]);
  // Best 8 third-place teams by pts/gd/gf
  const thirds=[...st.map(s=>s[2])].sort((a,b)=>{
    const sa=wc.stats[a],sb=wc.stats[b];
    if(sb.pts!==sa.pts)return sb.pts-sa.pts;
    const gda=sa.gf-sa.ga,gdb=sb.gf-sb.ga;
    if(gdb!==gda)return gdb-gda;
    return sb.gf-sa.gf;
  }).slice(0,8);
  // 32 teams into R32: 8 winners vs 8 thirds, 4 winners vs 4 runners, 4 runners vs 4 runners
  const r32=[
    [winners[0],thirds[7]],[winners[1],thirds[6]],[winners[2],thirds[5]],[winners[3],thirds[4]],
    [winners[4],thirds[3]],[winners[5],thirds[2]],[winners[6],thirds[1]],[winners[7],thirds[0]],
    [winners[8],runners[11]],[winners[9],runners[10]],[winners[10],runners[9]],[winners[11],runners[8]],
    [runners[0],runners[7]],[runners[1],runners[6]],[runners[2],runners[5]],[runners[3],runners[4]],
  ];
  wc.ko=[
    r32.map(([a,b])=>({a,b,ga:0,gb:0,pens:null,played:false})),
    Array(8).fill(0).map(()=>({a:-1,b:-1,ga:0,gb:0,pens:null,played:false})),
    Array(4).fill(0).map(()=>({a:-1,b:-1,ga:0,gb:0,pens:null,played:false})),
    Array(2).fill(0).map(()=>({a:-1,b:-1,ga:0,gb:0,pens:null,played:false})),
    [{a:-1,b:-1,ga:0,gb:0,pens:null,played:false}],
  ];
  wc.koR=0;
}
function wcKOSim(a,b){let r=wcQSim(WC_TEAMS[a].s,WC_TEAMS[b].s);if(r.ga===r.gb){const e=wcQSim(WC_TEAMS[a].s,WC_TEAMS[b].s);r.ga+=Math.min(e.ga,1);r.gb+=Math.min(e.gb,1);}let pens=null;if(r.ga===r.gb){const w=Math.random()<0.5+(WC_TEAMS[a].s-WC_TEAMS[b].s)/200;pens=w?[5,3]:[3,5];}return{...r,pens};}
function wcKOWinner(m){if(m.pens)return m.pens[0]>m.pens[1]?m.a:m.b;return m.ga>m.gb?m.a:m.b;}
function wcAdvKO(){
  const round=wc.ko[wc.koR];if(!round.every(m=>m.played))return;
  if(wc.koR>=4){wc.phase='DONE';wcRender();return;}
  const next=wc.ko[wc.koR+1];
  for(let i=0;i<round.length;i+=2){const wa=wcKOWinner(round[i]),wb=wcKOWinner(round[i+1]);next[i/2]={a:wa,b:wb,ga:0,gb:0,pens:null,played:false};}
  wc.koR++;
}

function wcRender(){
  const body=document.getElementById('wc-body'),footer=document.getElementById('wc-footer');
  body.innerHTML='';footer.innerHTML='';body.onclick=null;
  if(wc.phase==='RESUME')wcRenderResume(body,footer);
  else if(wc.phase==='SELECT')wcRenderSelect(body,footer);
  else if(wc.phase==='GROUPS')wcRenderGroups(body,footer);
  else if(wc.phase==='KO')wcRenderKO(body,footer);
  else if(wc.phase==='ELIMINATED')wcRenderEliminated(body,footer);
  else if(wc.phase==='DONE')wcRenderDone(body,footer);
}

function wcRenderGroups(body,footer){
  const mdInfo=wcCurMD(),allDone=!mdInfo,md=mdInfo?mdInfo.md:3;
  wcSetPhase(allDone?'Group Stage — Complete':`Group Stage — Matchday ${md} of 3`);
  const mdBar=allDone?'':
    `<div class="wc-md-bar"><span class="wc-md-info">Matchday ${md}</span></div>`;
  const groups=Array.from({length:12},(_,g)=>{
    const st=wcStand(g);
    const rows=st.map((ti,rank)=>{const t=WC_TEAMS[ti],s=wc.stats[ti];return`<tr class="${rank<2?'wc-adv':''}${ti===wc.pt?' wc-ptm':''}"><td>${t.n}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td><td>${s.gf}</td><td>${s.ga}</td><td><b>${s.pts}</b></td></tr>`;}).join('');
    const matchSlice=allDone?wc.gm[g]:wc.gm[g].slice((md-1)*2,md*2);
    const mRows=matchSlice.map((m,li)=>{
      const mi=allDone?li:(md-1)*2+li,tA=wcT(m.a),tB=wcT(m.b),isPtm=m.a===wc.pt||m.b===wc.pt;
      const score=m.played?`<span class="wc-match-score">${m.ga}–${m.gb}</span>`:'<span class="wc-match-score">vs</span>';

      return`<div class="wc-match-row${isPtm?' wc-ptmatch':''}"><span class="wc-match-names">${tA.n} — ${tB.n}</span>${score}${btn}</div>`;
    }).join('');
    return`<div class="wc-group"><div class="wc-group-hdr">Group ${String.fromCharCode(65+g)}</div><table><thead><tr><th>Team</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>Pts</th></tr></thead><tbody>${rows}</tbody></table>${mRows}</div>`;
  }).join('');
  body.innerHTML=`${mdBar}<div class="wc-groups-grid">${groups}</div>`;
  body.onclick=e=>{
    const pb=e.target.closest('[data-pg]');
    if(pb){const g=+pb.dataset.pg,m=+pb.dataset.pm,match=wc.gm[g][m],pIsA=match.a===wc.pt;wcStartLive(pIsA?match.a:match.b,pIsA?match.b:match.a,{type:'group',g,m,playerIsA:pIsA});return;}

}
const KO_NAMES=['Round of 32','Round of 16','Quarter-finals','Semi-finals','Final'];
function wcRenderKO(body,footer){
  wcSetPhase(KO_NAMES[wc.koR]);
  const cols=wc.ko.map((round,ri)=>{
    const cards=round.map((m,mi)=>{
      const tA=wcT(m.a),tB=wcT(m.b),w=m.played?wcKOWinner(m):-1,pens=m.pens?` (${m.pens[0]}-${m.pens[1]} pen)` :'';
      const rA=`<div class="wc-ko-row${m.played&&w===m.a?' wc-winner':''}${m.a===wc.pt?' wc-ptm':''}"><span class="wc-ko-row-name">${tA.n}</span>${m.played?`<span class="wc-ko-row-score">${m.ga}</span>`:''}</div>`;
      const rB=`<div class="wc-ko-row${m.played&&w===m.b?' wc-winner':''}${m.b===wc.pt?' wc-ptm':''}"><span class="wc-ko-row-name">${tB.n}</span>${m.played?`<span class="wc-ko-row-score">${m.gb}${pens}</span>`:''}</div>`;
      const act=ri===wc.koR&&!m.played&&m.a>=0?(m.a===wc.pt||m.b===wc.pt?`<div class="wc-ko-act"><button class="wc-play-btn" data-kr="${ri}" data-ki="${mi}">▶ Play</button></div>`:`<div class="wc-ko-act" style="font-size:10px;color:#444;padding:3px 0">not played</div>`):'';
      return`<div class="wc-ko-card" style="border-color:${ri===wc.koR?'rgba(74,158,255,0.3)':'transparent'}">${rA}${rB}${act}</div>`;
    }).join('');
    return`<div class="wc-rcol"><div class="wc-rcol-title">${KO_NAMES[ri]}</div>${cards}</div>`;
  }).join('');
  const fin=wc.ko[4][0];
  const champCol=fin&&fin.played?`<div class="wc-rcol" style="justify-content:center;align-items:center"><div class="wc-rcol-title">Champion</div><div style="font-size:40px;text-align:center;padding:8px">${wcT(wcKOWinner(fin)).f}</div><div style="font-size:12px;color:#ffd700;text-align:center">${wcT(wcKOWinner(fin)).n}</div></div>`:'';
  body.innerHTML=`<div class="wc-bracket">${cols}${champCol}</div>`;
  body.onclick=e=>{const pb=e.target.closest('[data-kr]');if(pb){const ri=+pb.dataset.kr,mi=+pb.dataset.ki,m=wc.ko[ri][mi],pIsA=m.a===wc.pt;wcStartLive(pIsA?m.a:m.b,pIsA?m.b:m.a,{type:'ko',round:ri,idx:mi,playerIsA:pIsA});}};
  footer.innerHTML='';
  if(wc.ko[wc.koR].every(m=>m.played)&&wc.koR<4){const b=document.createElement('button');b.className='wc-btn wc-btn-gold';b.textContent=KO_NAMES[wc.koR+1]+' →';b.onclick=()=>{wcAdvKO();wcRender();};footer.appendChild(b);}
  if(wc.koR===4&&fin&&fin.played){footer.innerHTML=`<button class="wc-btn wc-btn-gold" id="wc-see-champ">🏆 See Champion</button>`;document.getElementById('wc-see-champ').onclick=()=>{wc.phase='DONE';wcRender();};}
}
function wcRenderDone(body,footer){
  const w=wcKOWinner(wc.ko[4][0]),t=wcT(w);
  wcSetPhase('Tournament Complete');
  body.innerHTML=`<div class="wc-champion"><span class="wc-champion-flag">${t.f}</span><div class="wc-champion-txt">🏆 ${t.n}</div><div class="wc-champion-sub">${w===wc.pt?'Congratulations — you are World Champions!':'World Cup Champions'}</div></div>`;
  footer.innerHTML=`<button class="wc-btn" id="wc-new">New Tournament</button><button class="wc-btn wc-btn-green" id="wc-close">Close</button>`;
  document.getElementById('wc-new').onclick=()=>{clearWC();wc.phase='SELECT';wc.pt=-1;wcRender();};
  document.getElementById('wc-close').onclick=()=>{wcHide();wc.on=false;const dyn=document.getElementById('team-dyn-style');if(dyn)dyn.remove();document.querySelector('.team-name.team1-color').textContent='Blue';document.querySelector('.team-name.team2-color').textContent='Red';};
}
function wcStartLive(teamA,teamB,pInfo){
  game=new Game(); renderer.game=game; renderer.resize();
  game.teams[0].name=WC_TEAMS[teamA].n; game.teams[1].name=WC_TEAMS[teamB].n;
  // Apply kit colors — away team switches if colors clash
  const cA=WC_TEAMS[teamA].c;
  let cB=WC_TEAMS[teamB].c;
  if(wcColorDist(cA,cB)<100) cB=WC_TEAMS[teamB].c2||wcContrastColor(cB);
  game.teams[0].color=cA; game.teams[0].colorDk=wcDarken(cA);
  game.teams[1].color=cB; game.teams[1].colorDk=wcDarken(cB);
  // Inject CSS to update UI team colors (event log + header names)
  let dyn=document.getElementById('team-dyn-style');
  if(!dyn){dyn=document.createElement('style');dyn.id='team-dyn-style';document.head.appendChild(dyn);}
  dyn.textContent=`.ev1,.team1-color{color:${cA}}.ev2,.team2-color{color:${cB}}`;
  [teamA,teamB].forEach((ti,side)=>{const sc=WC_TEAMS[ti].s/78;game.teams[side].players.forEach(p=>{p.maxSpd=Math.min(p.maxSpd*sc,11);p.wcStr=sc;});});
  document.querySelector('.team-name.team1-color').textContent=WC_TEAMS[teamA].n;
  document.querySelector('.team-name.team2-color').textContent=WC_TEAMS[teamB].n;
  humanControl.player=null; humanControl.enabled=false; humanControl.init(game);
  // Auto-run at 2× speed
  game.speed=1.5; game.paused=false;
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.toggle('active',b.dataset.speed==='1.5'));
  document.getElementById('btn-pause').textContent='Pause';
  toastedCount=0; wc.pending=pInfo; wc.matchDone=false; wcHide(); CG.gameplayStart();
}
function wcOnFulltime(){
  if(wc.matchDone||!wc.pending)return; wc.matchDone=true;
  const p=wc.pending; wc.pending=null;
  const ga=game.teams[0].score,gb=game.teams[1].score;
  const rA=p.playerIsA?ga:gb,rB=p.playerIsA?gb:ga;
  if(p.type==='group'){
    const m=wc.gm[p.g][p.m];m.ga=rA;m.gb=rB;m.played=true;wcStat(m.a,rA,rB);wcStat(m.b,rB,rA);
    const md=wcCurMD();
    if(md)md.matches.forEach(({g,m:mi})=>{const x=wc.gm[g][mi];if(!x.played){const r=wcQSim(WC_TEAMS[x.a].s,WC_TEAMS[x.b].s);x.ga=r.ga;x.gb=r.gb;x.played=true;wcStat(x.a,r.ga,r.gb);wcStat(x.b,r.gb,r.ga);}});
    saveWC();
  } else {
    const m=wc.ko[p.round][p.idx];m.ga=rA;m.gb=rB;m.played=true;
    wc.ko[p.round].forEach(km=>{if(!km.played&&km.a>=0){const r=wcKOSim(km.a,km.b);Object.assign(km,r,{played:true});}});
    const elimBy=wcKOWinner(m);
    const playerWon=elimBy===wc.pt;
    wcAdvKO();
    if(!playerWon){wc.phase='ELIMINATED';wc.elimRound=p.round;wc.elimBy=elimBy;}
  }
  saveWC();
  CG.gameplayStop();
  CG.requestAd(()=>{ wcShow(); wcRender(); });
}
// Init CrazyGames SDK
(async()=>{
  try{
    if(window.CrazyGames?.SDK){
      CG.sdk=window.CrazyGames.SDK;
      CG.sdk.game.loadingStart();
      await CG.sdk.init();
      CG.sdk.game.loadingStop();
      CG.sdk.game.addSettingsChangeListener(s=>{ if(s.muteAudio!==undefined) setMute(s.muteAudio); });
      if(CG.sdk.game.settings?.muteAudio) setMute(true);
    }
  }catch(e){}
})();

// Start with World Cup screen
wc.on=true;
try{const s=JSON.parse(localStorage.getItem('fm_wc'));if(s&&s.phase&&s.phase!=='SELECT'&&s.phase!=='DONE'){Object.assign(wc,s);wc.savedPhase=wc.phase;wc.phase='RESUME';}}catch(e){}
wcShow(); wcRender();

let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000, 0.05);
  lastT=ts;
  game.update(dt);
  if (game.state === ST.PLAY || game.state === ST.GK_HOLD) {
    humanControl.autoSwitch(game);
  }

  if(wc.pending&&game.state===ST.FULL&&!wc.matchDone)wcOnFulltime();

  const ft=game.gameTime*(45/HALF_DUR);
  timerEl.textContent=`${String(Math.floor(ft)).padStart(2,'0')}:${String(Math.floor((ft%1)*60)).padStart(2,'0')}`;
  scoreEl.textContent=`${game.teams[0].score} - ${game.teams[1].score}`;
  halfLbl.textContent=game.half===1?'1st Half':'2nd Half';

  if(game.message){msgOvl.textContent=game.message;msgOvl.classList.add('show');}
  else msgOvl.classList.remove('show');

  renderer.draw();
  const evLog=document.getElementById('event-log');
  evLog.innerHTML=game.events.slice(0,12).map(e=>`<div class="ev"><span class="ev-t">${e.ts}</span>${e.html}</div>`).join('');
  if(game.events.length>toastedCount){
    if(game.events.length<toastedCount)toastedCount=0;
    game.events.slice(0,game.events.length-toastedCount).reverse().forEach(showToast);
    toastedCount=game.events.length;
  }
  // Dice cooldown tick — only update the roll button text, never touch the upgrade list
  if (diceState.cooldown > 0) {
    const prevSec = Math.ceil(diceState.cooldown);
    diceState.cooldown = Math.max(0, diceState.cooldown - dt);
    const newSec = Math.ceil(diceState.cooldown);
    if (newSec !== prevSec) renderDiceCooldown();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Football Match Simulation</title>
<script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; flex-direction: column; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; }
#ui { display: flex; align-items: center; gap: 18px; padding: 8px 20px; background: rgba(0,0,0,0.7); color: #fff; width: 100%; flex-shrink: 0; }
#main-layout { display: flex; flex: 1; overflow: hidden; width: 100%; min-height: 0; }
#right-col { display: flex; flex-direction: column; flex: 1; overflow: hidden; position: relative; }
#scoreboard { font-size: 22px; font-weight: bold; letter-spacing: 1px; min-width: 260px; text-align: center; }
.team-name { display: inline-block; min-width: 60px; }
.team1-color { color: #4a9eff; }
.team2-color { color: #ff4a4a; }
#timer { font-size: 16px; color: #ccc; min-width: 50px; text-align: center; }
button { background: #333; color: #fff; border: 1px solid #555; border-radius: 6px; padding: 5px 14px; cursor: pointer; font-size: 13px; transition: background 0.2s; }
button:hover { background: #555; }
button.active { background: #4a9eff; border-color: #4a9eff; }
#speed-controls { display: flex; gap: 4px; }
#btn-mute { padding: 5px 9px; font-size: 14px; }
#message-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; font-weight: bold; color: #fff; text-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 40px rgba(0,0,0,0.5); pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 20; }
#message-overlay.show { opacity: 1; }
#half-label { font-size: 13px; color: #aaa; }
canvas { display: block; flex: 1; min-height: 0; }
#controls-help { font-size: 10px; color: #888; white-space: nowrap; }
#tooltip { position: absolute; background: rgba(0,0,0,0.85); color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 12px; pointer-events: none; display: none; z-index: 15; }
#left-col { width: 250px; flex-shrink: 0; display: flex; flex-direction: column; background: rgba(0,0,0,0.72); border-right: 1px solid rgba(255,255,255,0.08); overflow: hidden; }
#event-log { display: none; }
.ev { padding: 3px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 11px; line-height: 1.4; color: #ccc; }
.ev-t { color: #666; margin-right: 5px; font-size: 10px; }
.ev1 { color: #4a9eff; }
.ev2 { color: #ff4a4a; }
.ev-goal { color: #ffd700; font-weight: bold; }
.ev-pen { color: #ff9900; font-weight: bold; }
#dice-panel { flex-shrink: 0; overflow-y: auto; padding: 10px 10px 12px; user-select: none; }
#dice-panel h3 { color: #4a9eff; font-size: 13px; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 1px; }
#dice-points { color: #ffd700; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
#dice-faces { display: flex; gap: 14px; justify-content: center; margin-bottom: 10px; height: 140px; align-items: flex-end; overflow: visible; }
.die-wrap { width: 56px; height: 56px; perspective: 260px; flex-shrink: 0; position: relative; }
.die-cube { width: 56px; height: 56px; transform-style: preserve-3d; position: relative; transform: rotateX(-20deg) rotateY(20deg); }
.die-face { position: absolute; width: 56px; height: 56px; background: linear-gradient(145deg,#fffef0 0%,#f0e8cc 100%); border: 1.5px solid #b8a070; border-radius: 10px; box-sizing: border-box; display: grid; grid-template: repeat(3,1fr)/repeat(3,1fr); padding: 6px; box-shadow: inset 0 0 10px rgba(0,0,0,0.08); }
.die-front  { transform: translateZ(28px); }
.die-back   { transform: rotateY(180deg) translateZ(28px); }
.die-top    { transform: rotateX(90deg) translateZ(28px); }
.die-bottom { transform: rotateX(-90deg) translateZ(28px); }
.die-right  { transform: rotateY(90deg) translateZ(28px); }
.die-left   { transform: rotateY(-90deg) translateZ(28px); }
.die-cell { display: flex; align-items: center; justify-content: center; }
.die-dot { width: 9px; height: 9px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #e03030, #880000); box-shadow: 0 1px 2px rgba(0,0,0,0.5); }
@keyframes die-jump {
  0%   { transform: translateY(0px) scale(1); }
  18%  { transform: translateY(-68px) scale(1.14); }
  45%  { transform: translateY(-40px) scale(1.07); }
  68%  { transform: translateY(-14px) scale(1.02); }
  83%  { transform: translateY(6px) scale(0.96); }
  92%  { transform: translateY(-2px) scale(1.01); }
  100% { transform: translateY(0px) scale(1); }
}
.die-wrap.jumping { animation: die-jump 0.8s cubic-bezier(0.3,0.6,0.4,1) forwards; }
.die-wrap.die-clickable { cursor: pointer; }
.die-wrap.die-saved { filter: drop-shadow(0 0 7px #ffd700) drop-shadow(0 0 3px #ffd700); }
.die-save-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #ffd700; font-weight: bold; letter-spacing: 1px; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
.die-wrap.die-saved .die-save-label { opacity: 1; }
#dice-combo { text-align: center; font-size: 13px; font-weight: bold; min-height: 20px; margin-bottom: 4px; opacity: 0; transition: opacity 0.4s, transform 0.2s; letter-spacing: 0.5px; }
#triple-hint { text-align: center; font-size: 11px; font-weight: bold; min-height: 16px; margin-bottom: 6px; opacity: 0; transition: opacity 0.3s; letter-spacing: 0.4px; }
#btn-roll { width: 100%; padding: 9px 0; background: #2a6; color: #fff; border: none; border-radius: 7px; font-size: 14px; font-weight: bold; cursor: pointer; margin-bottom: 12px; transition: background 0.2s, opacity 0.2s; }
#btn-roll:disabled { background: #444; opacity: 0.6; cursor: not-allowed; }
#btn-roll:not(:disabled):hover { background: #3b7; }
.upg-num { color: #888; font-weight: normal; }
.upg-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.upg-pos { color: #bbb; font-size: 10px; flex: 1; }
.upg-buy { background: #1a4a8a; color: #7af; border: 1px solid #2a6aaa; border-radius: 4px; font-size: 10px; padding: 2px 5px; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
.upg-buy:disabled { background: #2a2a2a; color: #555; border-color: #444; cursor: not-allowed; }
.upg-buy:not(:disabled):hover { background: #2a6aaa; }
.upg-maxed { color: #4a9eff; font-size: 10px; font-weight: bold; }
.upg-bar { display: flex; gap: 2px; margin: 0 3px; }
.upg-pip { width: 6px; height: 6px; border-radius: 2px; background: #333; }
.upg-pip.on { background: #4a9eff; }
.plr-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 3px; margin-bottom: 8px; }
.plr-btn { background: #1a1a3a; color: #bbb; border: 1px solid #333; border-radius: 4px; font-size: 9px; padding: 4px 1px; cursor: pointer; line-height: 1.3; text-align: center; transition: background 0.15s, border-color 0.15s; }
.plr-btn:hover { background: #252550; border-color: #4a9eff; }
.plr-btn.selected { background: #1a4a8a; border-color: #4a9eff; color: #7af; }
.upg-sel-name { color: #ffd700; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 6px; margin-bottom: 5px; }
canvas { touch-action: none; }

/* ===== WORLD CUP OVERLAY ===== */
#wc-overlay { position:fixed; inset:0; background:#080818; z-index:200; display:flex; flex-direction:column; overflow:hidden; color:#fff; font-family:'Segoe UI',Arial,sans-serif; }
#wc-hdr { display:flex; align-items:center; gap:12px; padding:12px 20px; background:rgba(0,0,0,0.6); border-bottom:1px solid rgba(255,255,255,0.1); flex-shrink:0; }
#wc-hdr-title { font-size:20px; font-weight:bold; color:#ffd700; }
#wc-hdr-phase { font-size:13px; color:#aaa; margin-left:auto; }
#wc-body { flex:1; overflow-y:auto; padding:14px 16px; }
#wc-footer { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; padding:10px 16px; border-top:1px solid rgba(255,255,255,0.1); flex-shrink:0; background:rgba(0,0,0,0.4); }
.wc-btn { background:#1a4a8a; color:#7af; border:1px solid #2a6aaa; border-radius:6px; font-size:13px; padding:8px 18px; cursor:pointer; transition:background 0.15s; }
.wc-btn:hover { background:#2a6aaa; }
.wc-btn-green { background:#2a6; color:#fff; border-color:#3b7; }
.wc-btn-green:hover { background:#3b7; }
.wc-btn-gold { background:rgba(255,215,0,0.12); color:#ffd700; border-color:rgba(255,215,0,0.35); }
.wc-btn-gold:hover { background:rgba(255,215,0,0.22); }
/* Team select */
.wc-select-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:8px; }
.wc-tcard { background:rgba(255,255,255,0.05); border:2px solid transparent; border-radius:8px; padding:10px 6px 8px; cursor:pointer; text-align:center; transition:all 0.15s; }
.wc-tcard:hover { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.25); }
.wc-tcard.wc-sel { border-color:#ffd700; background:rgba(255,215,0,0.1); }
.wc-tcard-flag { font-size:30px; line-height:1; display:block; margin-bottom:5px; }
.wc-tcard-name { font-size:11px; color:#ddd; font-weight:bold; line-height:1.3; }
.wc-tcard-str { font-size:10px; color:#777; margin-top:3px; }
/* Groups */
.wc-groups-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:10px; }
.wc-group { background:rgba(255,255,255,0.04); border-radius:8px; overflow:hidden; }
.wc-group-hdr { background:rgba(74,158,255,0.18); padding:5px 10px; font-size:11px; font-weight:bold; color:#4a9eff; letter-spacing:1px; text-transform:uppercase; display:flex; justify-content:space-between; align-items:center; }
.wc-group table { width:100%; border-collapse:collapse; font-size:11px; }
.wc-group th { padding:3px 6px; color:#666; font-weight:normal; text-align:center; }
.wc-group th:first-child { text-align:left; }
.wc-group td { padding:3px 6px; color:#ccc; text-align:center; border-top:1px solid rgba(255,255,255,0.05); }
.wc-group td:first-child { text-align:left; max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.wc-group tr.wc-adv td { background:rgba(74,158,255,0.07); }
.wc-group tr.wc-ptm > td:first-child { color:#ffd700; font-weight:bold; }
.wc-match-row { display:flex; align-items:center; gap:6px; padding:3px 8px; font-size:11px; border-top:1px solid rgba(255,255,255,0.05); }
.wc-match-row.wc-ptmatch { background:rgba(255,215,0,0.05); }
.wc-match-names { flex:1; color:#bbb; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.wc-match-score { color:#ffd700; font-weight:bold; min-width:30px; text-align:center; font-size:11px; }
.wc-play-btn { background:#2a6; color:#fff; border:none; border-radius:3px; padding:2px 7px; font-size:10px; cursor:pointer; white-space:nowrap; }
.wc-play-btn:hover { background:#3b7; }
/* Knockout bracket */
.wc-bracket { display:flex; gap:2px; min-width:max-content; padding-bottom:8px; }
.wc-rcol { display:flex; flex-direction:column; justify-content:space-around; width:160px; padding:0 4px; }
.wc-rcol-title { text-align:center; font-size:10px; color:#4a9eff; font-weight:bold; text-transform:uppercase; letter-spacing:1px; padding:4px 0 6px; border-bottom:1px solid rgba(74,158,255,0.25); margin-bottom:4px; }
.wc-ko-card { background:rgba(255,255,255,0.05); border-radius:6px; overflow:hidden; margin:3px 0; border:1px solid rgba(255,255,255,0.07); }
.wc-ko-row { display:flex; align-items:center; padding:5px 8px; font-size:11px; color:#bbb; border-top:1px solid rgba(255,255,255,0.06); }
.wc-ko-row:first-child { border-top:none; }
.wc-ko-row.wc-winner { background:rgba(255,215,0,0.08); color:#ffd700; font-weight:bold; }
.wc-ko-row.wc-ptm { font-weight:bold; color:#fff; }
.wc-ko-row-name { flex:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.wc-ko-row-score { font-size:11px; font-weight:bold; min-width:16px; text-align:right; color:#fff; }
.wc-ko-act { text-align:center; padding:4px; border-top:1px solid rgba(255,255,255,0.08); }
/* Matchday action bar */
.wc-md-bar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; background:rgba(255,255,255,0.04); border-radius:8px; padding:10px 14px; margin-bottom:14px; }
.wc-md-info { font-size:13px; color:#ccc; }
.wc-md-btns { display:flex; gap:8px; flex-wrap:wrap; }
/* Champion banner */
.wc-champion { text-align:center; padding:30px 20px; }
.wc-champion-flag { font-size:80px; display:block; margin-bottom:12px; }
.wc-champion-txt { font-size:28px; font-weight:bold; color:#ffd700; margin-bottom:8px; }
.wc-champion-sub { font-size:15px; color:#aaa; }
@media (max-width:700px) {
  .wc-select-grid { grid-template-columns:repeat(auto-fill,minmax(85px,1fr)); gap:6px; }
  .wc-tcard-flag { font-size:24px; }
  .wc-tcard-name { font-size:10px; }
  .wc-groups-grid { grid-template-columns:1fr; }
  .wc-bracket { overflow-x:auto; }
  .wc-rcol { width:140px; }
}
#toast-container { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); z-index: 30; display: flex; flex-direction: column; align-items: center; gap: 5px; pointer-events: none; width: 92%; }
.toast { background: rgba(0,0,0,0.82); color: #ccc; padding: 6px 16px; border-radius: 18px; font-size: 13px; line-height: 1.4; border: 1px solid rgba(255,255,255,0.14); white-space: nowrap; max-width: 100%; overflow: hidden; text-overflow: ellipsis; animation: toast-fade 3s ease forwards; }
.toast-goal { border-color: rgba(255,215,0,0.5); background: rgba(20,15,0,0.88); }
@keyframes toast-fade { 0%{opacity:0;transform:translateY(-8px)} 12%{opacity:1;transform:translateY(0)} 75%{opacity:1} 100%{opacity:0} }
@media (max-width: 700px) {
  /* Top bar: score on its own full-width row, controls on second row */
  #ui { padding: 6px 12px; gap: 8px; flex-wrap: wrap; justify-content: center; }
  #half-label { display: none; }
  #controls-help { display: none; }
  #scoreboard { order: -1; width: 100%; font-size: 22px; min-width: auto; }
  #timer { font-size: 15px; }
  button { padding: 8px 16px; font-size: 14px; }

  /* Main layout: canvas on top, upgrades panel below */
  #main-layout { flex-direction: column; }
  #right-col { order: 1; flex: none; width: 100%; }
  #left-col { order: 2; width: 100%; height: clamp(180px, 38vh, 290px); overflow-y: auto; background: rgba(0,0,0,0.72); border-right: none; border-top: 1px solid rgba(255,255,255,0.08); }

  /* Dice panel — tight top spacing so dice appear high */
  #dice-panel { overflow-y: visible; padding: 0 14px 12px; }
  #dice-panel h3 { font-size: 15px; margin-bottom: 0; }
  #dice-points { font-size: 18px; margin-bottom: 0; }
  #dice-faces { height: 130px; gap: 18px; margin-bottom: 10px; }
  .die-wrap { width: 50px; height: 50px; perspective: 240px; }
  .die-cube { width: 50px; height: 50px; }
  .die-face { width: 50px; height: 50px; border-radius: 9px; padding: 6px; }
  .die-dot { width: 8px; height: 8px; }
  .die-front  { transform: translateZ(25px); }
  .die-back   { transform: rotateY(180deg) translateZ(25px); }
  .die-top    { transform: rotateX(90deg) translateZ(25px); }
  .die-bottom { transform: rotateX(-90deg) translateZ(25px); }
  .die-right  { transform: rotateY(90deg) translateZ(25px); }
  .die-left   { transform: rotateY(-90deg) translateZ(25px); }
  #dice-combo { font-size: 14px; min-height: 22px; margin-bottom: 8px; }
  #btn-roll { font-size: 16px; padding: 12px 0; border-radius: 8px; margin-bottom: 14px; }

  /* Player picker — 4 columns, big tap targets */
  .plr-grid { grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; }
  .plr-btn { font-size: 15px; padding: 11px 5px; border-radius: 5px; }

  /* Upgrade list rows */
  .upg-sel-name { font-size: 12px; padding-top: 8px; margin-bottom: 7px; }
  .upg-row { margin-bottom: 7px; }
  .upg-pos { font-size: 12px; }
  .upg-buy { font-size: 12px; padding: 5px 9px; border-radius: 5px; }
  .upg-maxed { font-size: 12px; }
  .upg-pip { width: 9px; height: 9px; }
  .upg-bar { gap: 3px; margin: 0 5px; }
}
</style>
</head>
<body>
<div id="ui">
  <span id="half-label">1st Half</span>
  <div id="scoreboard">
    <span class="team-name team1-color">Blue</span>
    <span id="score">0 - 0</span>
    <span class="team-name team2-color">Red</span>
  </div>
  <span id="timer">00:00</span>
  <button id="btn-pause">Pause</button>
  <div id="speed-controls">
    <button class="speed-btn" data-speed="1">1x</button>
    <button class="speed-btn active" data-speed="1.5">1.5x</button>
    <button class="speed-btn" data-speed="3">3x</button>
  </div>
  <button id="btn-mute" title="Toggle sound">🔊</button>
</div>
<div id="wc-overlay" style="display:none">
  <div id="wc-hdr">
    <span id="wc-hdr-title">🏆 World Cup</span>
    <span id="wc-hdr-phase"></span>
  </div>
  <div id="wc-body"></div>
  <div id="wc-footer"></div>
</div>
<div id="tooltip"></div>
<div id="main-layout">
  <div id="left-col">
    <div id="dice-panel">
      <h3>Blue Upgrades</h3>
      <div id="dice-points">Points: 0</div>
      <div id="dice-faces"></div>
      <div id="dice-combo"></div>
      <div id="triple-hint"></div>
      <button id="btn-roll">ROLL DICE</button>
      <div id="upg-list"></div>
    </div>
  </div>
  <div id="right-col">
    <canvas id="pitch"></canvas>
    <div id="message-overlay"></div>
    <div id="toast-container"></div>
  </div>
  <div id="event-log"></div>
</div>

<script>
// ===================== CONFIG =====================
const PW = 105, PH = 68;
const GOAL_W = 7.32, GOAL_DEPTH = 2.4;
const PENALTY_W = 40.32, PENALTY_D = 16.5;
const GOAL_AREA_W = 18.32, GOAL_AREA_D = 5.5;
const CENTER_R = 9.15, PENALTY_SPOT = 11, CORNER_R = 1;
const HALF_DUR = 180;

const FRICTION = 1.8;
const BALL_R = 0.4, PLAYER_R = 0.9;
const CONTROL_R = 2.0, TACKLE_R = 1.5, TACKLE_PCT = 0.022;
const GK_DIVE = 4.2, GK_SAVE_BASE = 0.55;

const SPD_MAX = 7.8, SPD_GK = 6.5, SPD_DRIBBLE = 6.0;
const ACCEL = 20;
const PASS_LO = 10, PASS_HI = 22, SHOT_LO = 18, SHOT_HI = 28;

const DT_BALL = 0.18, DT_OFF = 0.45, DT_DEF = 0.40;
const KICKOFF_WAIT = 1.5, GOAL_WAIT = 2.5, RESTART_WAIT = 1.8, GK_HOLD_T = 1.5;
const GRAVITY = 9.8;
const TRAP_Z_MAX = 2.0; // max height players can chest-trap/control
const HEAD_Z_LO = 2.0, HEAD_Z_HI = 3.5; // height range where must head (too high to trap)
const LOFT_DIST = 22; // passes longer than this get lofted
const BOUNCE = 0.25; // energy kept on bounce (dead grass bounce)

// Tactical AI
const OFFSIDE_BUF = 1.0;    // stay this far behind offside line
const COUNTER_WINDOW = 3.0;  // seconds after winning ball = counter mode
const PRESS_COORD_R = 18;    // coordinated pressing radius
const BUILDUP_X = 0.35;      // own-third threshold (fraction of pitch)
const SWITCH_BONUS = 8;      // bonus for switching play to open wing
const THROUGH_BONUS = 12;    // bonus for through balls behind defense

// Set pieces
const FOUL_PCT = 0.50;        // 50% of tackles are fouls
const CORNER_SETUP = 7.0;     // seconds for corner setup (more time for players to get in box)
const THROWIN_SETUP = 2.5;    // seconds for throw-in setup
const FREEKICK_SETUP = 7.0;   // seconds for free kick setup (more time for wall/attackers)
const PENALTY_SETUP = 4.5;    // seconds for penalty setup
const WALL_DIST = 9.15;       // free kick wall distance

// Fatigue system
const STAMINA_DRAIN_SPRINT = 0.032;  // per second while sprinting
const STAMINA_DRAIN_JOG = 0.008;     // per second while jogging
const STAMINA_RECOVER = 0.006;       // per second while idle
const STAMINA_GK_FACTOR = 0.3;       // GKs drain 30% as fast
const STAMINA_MIN_SPD = 0.82;        // at 0 stamina, 82% speed
const STAMINA_TOUCH_PENALTY = 0.15;  // max kickCD added at 0 stamina

// First touch / ball control
const FIRST_TOUCH_BASE_CD = 0.06;    // base kickCD on receiving
const FIRST_TOUCH_PRESSURE_CD = 0.12; // extra CD when under pressure
const FIRST_TOUCH_DISPLACE = 1.0;    // max ball displacement on bad touch

// Give-and-go
const ONE_TWO_CHANCE = 0.25;         // 25% chance passer initiates one-two
const ONE_TWO_DURATION = 3.0;        // seconds the one-two window is active
const ONE_TWO_BONUS = 10;            // pass eval bonus for return ball

// Hold/Shield behavior
const HOLD_THRESHOLD = 3;            // min score to avoid holding
const HOLD_DURATION = 0.6;           // seconds to hold before re-deciding
const SHIELD_OPP_RANGE = 4;          // shield when opponent within this range

// Tempo variation
const TEMPO_BUILDUP = 1.4;           // decision timer multiplier in build-up
const TEMPO_COUNTER = 0.6;           // multiplier in counter-attack
const TEMPO_FINAL_THIRD = 0.8;       // multiplier in final third
const TEMPO_WINNING_LATE = 1.6;      // multiplier when winning late

// Third-man runs
const THIRD_MAN_CHANCE = 0.35;       // chance of third-man run after pass
const THIRD_MAN_RUN_DIST = 12;       // meters forward for the run

// Defensive transition
const DEF_TRANSITION_WINDOW = 3.0;   // seconds in def transition mode
const DEF_TRANSITION_DROP_SPD = 1.15; // speed multiplier when retreating

// ===================== DICE / UPGRADE SYSTEM =====================
// Dot grid positions (1=top-left … 9=bot-right in a 3×3 grid)
const DOT_PATTERNS = { 1:[5], 2:[1,9], 3:[3,5,7], 4:[1,3,7,9], 5:[1,3,5,7,9], 6:[1,4,7,3,6,9] };

// rotateX / rotateY to bring each face toward the viewer
const DIE_FACE_ROT = { 1:[0,0], 2:[-90,0], 3:[0,-90], 4:[0,90], 5:[90,0], 6:[0,180] };

function makeFaceDots(n) {
  const cells = Array(9).fill('');
  DOT_PATTERNS[n].forEach(i => { cells[i-1] = '<div class="die-dot"></div>'; });
  return cells.map(c => `<div class="die-cell">${c}</div>`).join('');
}

function initDice3D() {
  const container = document.getElementById('dice-faces');
  let html = '';
  for (let i = 0; i < 3; i++) {
    html += `<div class="die-wrap" id="die${i}">
      <div class="die-cube" id="die${i}-cube">
        <div class="die-face die-front">${makeFaceDots(1)}</div>
        <div class="die-face die-back">${makeFaceDots(6)}</div>
        <div class="die-face die-top">${makeFaceDots(2)}</div>
        <div class="die-face die-bottom">${makeFaceDots(5)}</div>
        <div class="die-face die-right">${makeFaceDots(3)}</div>
        <div class="die-face die-left">${makeFaceDots(4)}</div>
      </div>
      <div class="die-save-label">SAVE</div>
    </div>`;
  }
  container.innerHTML = html;
  for (let i = 0; i < 3; i++) {
    document.getElementById(`die${i}`).addEventListener('click', () => handleDieClick(i));
  }
}

function animateDie3D(idx, value, delay) {
  setTimeout(() => {
    const [fRX, fRY] = DIE_FACE_ROT[value];
    const cube = document.getElementById(`die${idx}-cube`);
    const wrap = document.getElementById(`die${idx}`);
    // Snap back to neutral instantly, then spin to final face
    cube.style.transition = 'none';
    cube.style.transform = `rotateX(-20deg) rotateY(20deg)`;
    void cube.offsetWidth;
    cube.style.transition = 'transform 0.72s cubic-bezier(0.15,0.85,0.25,1.0)';
    cube.style.transform = `rotateX(${720+fRX}deg) rotateY(${720+fRY}deg)`;
    // Jump
    wrap.classList.remove('jumping');
    void wrap.offsetWidth;
    wrap.classList.add('jumping');
  }, delay);
}

const diceState = {

// Initialise per-player level objects

function resetDiceState(){
  diceState.points=0;
  for(let i=2;i<=11;i++){const keys=PLAYER_UPG_KEYS[i-1];diceState.playerLevels[i]={};for(const k of keys)diceState.playerLevels[i][k]=0;}

// Persist tournament state
function saveWC(){
  if(!wc||wc.phase==='SELECT'||wc.phase==='RESUME')return;
  localStorage.setItem('fm_wc',JSON.stringify({phase:wc.phase,pt:wc.pt,groups:wc.groups,stats:wc.stats,gm:wc.gm,koR:wc.koR,ko:wc.ko,elimRound:wc.elimRound,elimBy:wc.elimBy}));
}

// Persist upgrades across sessions
function saveDiceState() {
  localStorage.setItem('fm_dice', JSON.stringify({points: diceState.points, playerLevels: diceState.playerLevels}));
}
(function loadDiceState() {
  try {
    const saved = JSON.parse(localStorage.getItem('fm_dice'));
    if (!saved) return;
    diceState.points = saved.points || 0;
    for (const num in saved.playerLevels) {
      if (diceState.playerLevels[num]) Object.assign(diceState.playerLevels[num], saved.playerLevels[num]);
    }
  } catch(e) {}
})();

// Get upgrade level for a specific player + stat (0 if not Blue or GK)
function upg(p, key) {
  if (!p || p.team !== game.teams[0] || p.role===R.GK) return 0;
  return diceState.playerLevels[p.num]?.[key] || 0;
}

function checkCombo(dice) {
  const counts = {};
  for (const d of dice) counts[d] = (counts[d]||0)+1;
  const entries = Object.entries(counts).map(([v,c])=>({v:+v,c}));
  const triple = entries.find(e=>e.c===3);
  const pair   = entries.find(e=>e.c===2);
  if (triple) {
    if (triple.v===6) return { label:'JACKPOT! ⚡', bonus:150, color:'#ff0' };
    return { label:`THREE ${triple.v}s!`, bonus:80, color:'#f80' };
  }
  if (pair) {
    return { label:`PAIR of ${pair.v}s`, bonus:35, color:'#4f8' };
  }
  return null;
}

function showCombo(combo) {
  const el = document.getElementById('dice-combo');
  if (!combo) { el.textContent=''; el.style.opacity='0'; return; }
  el.textContent = `${combo.label}  +${combo.bonus}`;
  el.style.color = combo.color;
  el.style.opacity = '1';
  el.style.transform = 'scale(1.15)';
  setTimeout(()=>{ el.style.transform='scale(1)'; }, 200);
  setTimeout(()=>{ el.style.opacity='0'; }, 3000);
}

function handleDieClick(idx) {
  if (!diceState.lastRoll) return;
  diceState.savedIdx = (diceState.savedIdx === idx) ? null : idx;
  updateSaveUI();
  renderDiceCooldown();
}

function updateSaveUI() {
  const roll = diceState.lastRoll;
  const hasRoll = !!roll;
  for (let i = 0; i < 3; i++) {
    const wrap = document.getElementById(`die${i}`);
    if (!wrap) continue;
    wrap.classList.toggle('die-clickable', hasRoll);
    wrap.classList.toggle('die-saved', diceState.savedIdx === i);
  }

  const hint = document.getElementById('triple-hint');
  if (!hint) return;
  if (!roll) { hint.style.opacity = '0'; return; }

  const counts = {};
  for (const d of roll) counts[d] = (counts[d]||0)+1;
  const pairEntry = Object.entries(counts).find(([,c]) => c === 2);
  const isTriple = Object.values(counts).some(c => c === 3);

  if (isTriple || !pairEntry) { hint.style.opacity = '0'; return; }

  const pairVal = +pairEntry[0];
  const savedIsPairDie = diceState.savedIdx !== null && roll[diceState.savedIdx] === pairVal;
  if (savedIsPairDie) {
    hint.textContent = `⚡ Triple chance! Re-roll for +80 pts`;
    hint.style.color = '#f80';
  } else {
    hint.textContent = `Pair of ${pairVal}s — save a ${pairVal} → triple!`;
    hint.style.color = '#4f8';
  }
  hint.style.opacity = '1';
}

function rollDice() {
  if (diceState.cooldown > 0) return;
  if(typeof playSfx!=='undefined') playSfx(sfxDice);
  const prevSavedIdx = diceState.savedIdx;
  const prevRoll = diceState.lastRoll;

  const dice = [
    Math.floor(Math.random()*6)+1,
    Math.floor(Math.random()*6)+1,
    Math.floor(Math.random()*6)+1,
  ];
  if (prevSavedIdx !== null && prevRoll) {
    dice[prevSavedIdx] = prevRoll[prevSavedIdx];
  }

  diceState.lastRoll = dice;
  diceState.savedIdx = null;

  const base = dice[0]+dice[1]+dice[2];
  const combo = checkCombo(dice);
  const bonus = combo ? combo.bonus : 0;
  diceState.points += base + bonus;
  diceState.cooldown = diceState.maxCooldown;
  saveDiceState();

  for (let i = 0; i < 3; i++) {
    if (i === prevSavedIdx) continue;
    animateDie3D(i, dice[i], i*80);
  }
  setTimeout(() => showCombo(combo), 820);
  setTimeout(() => updateSaveUI(), 860);
  renderDiceCooldown();
  renderDicePanel();
}

function buyUpgrade(pnum, key) {
  const lv = diceState.playerLevels[pnum]?.[key] || 0;
  if (lv >= UPG_MAXLV) return;
  const cost = UPG_COSTS[key][lv];
  if (diceState.points < cost) return;
  diceState.points -= cost;
  diceState.playerLevels[pnum][key] = lv + 1;
  saveDiceState();
  renderDicePanel();
}

const PLR_POS_SHORT = [null,'LB','CB','CB','RB','LW','CM','CM','RW','ST','ST'];

function renderUpgradeList() {
  const list = document.getElementById('upg-list');
  const sel = diceState.selectedPlayer;

  // Player picker grid
  const gridBtns = [];
  for (let num=2; num<=11; num++) {
    const active = num===sel ? ' selected' : '';
    gridBtns.push(`<button class="plr-btn${active}" data-pnum="${num}">${PLR_POS_SHORT[num-1]}<br>#${num}</button>`);
  }

  // Selected player upgrade rows
  const keys = PLAYER_UPG_KEYS[sel-1];
  const posName = PLAYER_POS_NAMES[sel-1];
  const lvs = diceState.playerLevels[sel];
  const upgRows = keys.map(key => {
    const lv = lvs[key] || 0;
    const maxed = lv >= UPG_MAXLV;
    const cost = maxed ? 0 : UPG_COSTS[key][lv];
    const canAfford = !maxed && diceState.points >= cost;
    const pips = Array.from({length:UPG_MAXLV},(_,i)=>
      `<div class="upg-pip${i<lv?' on':''}"></div>`).join('');
    return `<div class="upg-row">
      <span class="upg-pos">${UPG_SHORT[key]}</span>
      <div class="upg-bar">${pips}</div>
      ${maxed
        ? `<span class="upg-maxed">MAX</span>`
        : `<button class="upg-buy" data-pnum="${sel}" data-key="${key}" ${canAfford?'':'disabled'}>${cost}pt</button>`}
    </div>`;
  }).join('');

  list.innerHTML = `
    <div class="plr-grid">${gridBtns.join('')}</div>
    <div class="upg-sel-name">${posName} <span class="upg-num">#${sel}</span></div>
    ${upgRows}
  `;
}

function renderDicePanel() {
  document.getElementById('dice-points').textContent = `Points: ${diceState.points}`;
  document.querySelector('#dice-panel h3').textContent = `${game.teams[0].name} Upgrades`;
  renderUpgradeList();
}

function renderDiceCooldown() {
  const btn = document.getElementById('btn-roll');
  if (diceState.cooldown > 0) {
    btn.disabled = true;
    btn.textContent = `ROLL (${Math.ceil(diceState.cooldown)}s)`;
  } else {
    btn.disabled = false;
    btn.textContent = diceState.savedIdx !== null ? 'ROLL (1 held)' : 'ROLL DICE';
  }
}

// ===================== VEC2 =====================
class V {
  constructor(x=0,y=0){this.x=x;this.y=y;}
  add(v){return new V(this.x+v.x,this.y+v.y);}
  sub(v){return new V(this.x-v.x,this.y-v.y);}
  mul(s){return new V(this.x*s,this.y*s);}
  len(){return Math.sqrt(this.x*this.x+this.y*this.y);}
  norm(){const l=this.len();return l>1e-4?this.mul(1/l):new V();}
  dist(v){return this.sub(v).len();}
  dot(v){return this.x*v.x+this.y*v.y;}
  clone(){return new V(this.x,this.y);}
  set(x,y){this.x=x;this.y=y;return this;}
}
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a);
function ptSegDist(p,a,b){const ab=b.sub(a),ap=p.sub(a);let t=clamp(ap.dot(ab)/Math.max(ab.dot(ab),1e-4),0,1);return p.dist(a.add(ab.mul(t)));}
function ballPredictPos(ball, time) {
  // Predict where ball will be after `time` seconds accounting for friction
  const spd = ball.vel.len();
  if (spd < 0.5) return ball.pos.clone();
  const dir = ball.vel.norm();
  const t = Math.min(time, spd / FRICTION);
  const dist = spd * t - 0.5 * FRICTION * t * t;
  return ball.pos.add(dir.mul(Math.max(dist, 0)));
}

// ===================== BALL =====================
class Ball {
  constructor(){this.pos=new V(PW/2,PH/2);this.vel=new V();this.z=0;this.vz=0;this.owner=null;this.lastOwner=null;this.lastKicker=null;this.justKicked=0;}
  update(dt){
    if(this.justKicked>0) this.justKicked-=dt;
    if(this.owner){
      const a=this.owner.facing.mul(1.2);
      this.pos.set(this.owner.pos.x+a.x, this.owner.pos.y+a.y);
      this.vel.set(0,0); this.z=0; this.vz=0;
    } else {
      this.pos.x+=this.vel.x*dt; this.pos.y+=this.vel.y*dt;
      // Horizontal friction (only on ground or always slight air drag)
      const s=this.vel.len();
      const fric = this.z < 0.3 ? FRICTION : FRICTION * 0.15; // much less friction in air
      if(s>0.1){const f=Math.min(fric*dt,s);this.vel=this.vel.sub(this.vel.norm().mul(f));}
      else if(this.z<0.3) this.vel.set(0,0);
      // Vertical physics
      if(this.z>0 || this.vz>0){
        this.vz -= GRAVITY * dt;
        this.z += this.vz * dt;
        if(this.z <= 0){
          this.z = 0;
          if(Math.abs(this.vz) > 1.0){
            this.vz = -this.vz * BOUNCE; // bounce
            this.vel = this.vel.mul(0.8); // lose horizontal speed on bounce
          } else {
            this.vz = 0; // settle on ground
          }
        }
      }
      if(this.z < 0.3) this.deflectPosts();
    }
  }
  deflectPosts(){
    const posts=[new V(0,PH/2-GOAL_W/2),new V(0,PH/2+GOAL_W/2),new V(PW,PH/2-GOAL_W/2),new V(PW,PH/2+GOAL_W/2)];
    for(const p of posts){if(this.pos.dist(p)<BALL_R+0.3){const n=this.pos.sub(p).norm();this.vel=this.vel.sub(n.mul(2*this.vel.dot(n))).mul(0.6);this.pos=p.add(n.mul(BALL_R+0.35));}}
  }
  kick(dir,power,loft=0){this.owner=null;this.vel=dir.norm().mul(power);this.vz=loft;this.justKicked=0.15;}
  reset(x,y){this.pos.set(x,y);this.vel.set(0,0);this.z=0;this.vz=0;this.owner=null;this.justKicked=0;}
  isAerial(){return this.z > TRAP_Z_MAX;} // too high even for chest trap
  isHeadable(){return this.z >= HEAD_Z_LO && this.z <= HEAD_Z_HI;} // must head, can't trap
  isTrappable(){return this.z > 0.5 && this.z <= TRAP_Z_MAX;} // chest/thigh trap range
  isGrounded(){return this.z < 0.5;}
}

// ===================== PLAYER =====================
const R={GK:0,DEF:1,MID:2,FWD:3};

class Player {
  constructor(team,num,role,fx,fy){
    this.team=team; this.num=num; this.role=role;
    this.formPos=new V(fx,fy);
    this.pos=new V(); this.vel=new V(); this.facing=new V(1,0);
    this.targetPos=null; this.hasBall=false;
    this.kickCD=0; this.dtimer=Math.random()*0.3;
    this.maxSpd=role===R.GK?SPD_GK:(role===R.FWD?SPD_MAX+0.3:SPD_MAX);
    this.wcStr=1.0;
    this.action='idle'; // idle, chase, receive, dribble, move
    // Fatigue
    this.stamina=1.0;
    // Give-and-go
    this.oneTwoTimer=0; this.oneTwoPartner=null;
    // Hold/Shield
    this.holdTimer=0; this.isHolding=false;
    // Third-man run
    this.thirdManTimer=0; this.thirdManTarget=null;
  }

  atkGoal(){return this.team.atkDir>0?new V(PW,PH/2):new V(0,PH/2);}
  defGoal(){return this.team.atkDir>0?new V(0,PH/2):new V(PW,PH/2);}
  distAtkGoal(){return this.pos.dist(this.atkGoal());}
  inOwnHalf(){return this.team.atkDir>0?this.pos.x<PW/2:this.pos.x>PW/2;}

  // Dynamic base position based on ball + possession
  basePosition(ball, hasPoss) {
    const ad = this.team.atkDir;
    if (this.role===R.GK) {
      const bx = ball.pos.x, by = ball.pos.y;
      const gx = ad>0 ? clamp(2 + bx*0.06, 2, 10) : clamp(PW-2 - (PW-bx)*0.06, PW-10, PW-2);
      const gy = clamp(PH/2 + (by-PH/2)*0.15, PH/2-GOAL_W/2-1.5, PH/2+GOAL_W/2+1.5);
      return new V(gx, gy);
    }

    // Ball progress from this team's perspective (0=own goal, 1=opp goal)
    const bProg = ad>0 ? ball.pos.x/PW : 1-ball.pos.x/PW;
    const bLat = ball.pos.y/PH;

    let fx=this.formPos.x, fy=this.formPos.y;

    // Push/pull formation based on ball and possession
    let shift = (bProg-0.45)*0.22;
    if (hasPoss) shift += 0.08; else shift -= 0.08;

    // Game state: losing → push higher, winning → sit deeper
    if (ball._game) {
      const sd = ball._game.scoreDiff(this.team);
      const tLeft = ball._game.timeLeft();
      const urgency = Math.max(0, 1 - tLeft/(HALF_DUR*1.2)); // 0 to ~0.8 as time runs out
      if (sd < 0) shift += 0.04 + urgency*0.06*(-sd); // push up when losing
      if (sd > 0) shift -= 0.03 + urgency*0.04*sd;     // sit deep when winning
    }

    // Lateral shift toward ball
    let latShift = (bLat-0.5)*0.12;

    let ax = clamp(fx+shift, 0.06, 0.94);
    let ay = clamp(fy+latShift, 0.06, 0.94);

    // Role limits
    if (this.role===R.DEF) ax = clamp(ax, 0.08, hasPoss?0.52:0.45);
    if (this.role===R.FWD) ax = clamp(ax, hasPoss?0.45:0.30, 0.96);

    // Fullbacks push wider when attacking
    if (this.role===R.DEF && hasPoss && (this.formPos.y<0.25||this.formPos.y>0.75)) {
      ax += 0.06;
      // Push to touchline
      ay = this.formPos.y < 0.25 ? clamp(ay-0.03, 0.05, 0.20) : clamp(ay+0.03, 0.80, 0.95);
    }

    let px = ad>0 ? ax*PW : (1-ax)*PW;
    let py = ay*PH;
    return new V(px,py);
  }

  moveToward(target, speed, dt) {
    const diff = target.sub(this.pos);
    const dist = diff.len();
    if (dist < 0.2) { this.vel = this.vel.mul(0.85); return; }
    const desired = diff.norm().mul(Math.min(speed, dist*4));
    const steer = desired.sub(this.vel);
    const maxS = ACCEL * dt;
    if (steer.len() > maxS) this.vel = this.vel.add(steer.norm().mul(maxS));
    else this.vel = this.vel.add(steer);
    const s = this.vel.len();
    if (s > speed) this.vel = this.vel.norm().mul(speed);
    this.pos = this.pos.add(this.vel.mul(dt));
    if (s > 0.3) this.facing = this.vel.norm();
  }

  update(dt, game) {
    this.kickCD = Math.max(0, this.kickCD-dt);
    this.dtimer -= dt;

    // --- STAMINA UPDATE ---
    const curSpd = this.vel.len();
    const drainMul = this.role === R.GK ? STAMINA_GK_FACTOR : 1.0;
    const stamLv = upg(this, 'stamina');
    const staminaDrainScale = 1 - stamLv*0.16;
    const staminaRecoverScale = 1 + stamLv*0.24;
    if (curSpd > this.maxSpd * 0.8) {
      this.stamina -= STAMINA_DRAIN_SPRINT * dt * drainMul * staminaDrainScale;
    } else if (curSpd > 2.0) {
      this.stamina -= STAMINA_DRAIN_JOG * dt * drainMul * staminaDrainScale;
    } else {
      this.stamina += STAMINA_RECOVER * dt * staminaRecoverScale;
    }
    this.stamina = clamp(this.stamina, 0, 1);

    // --- TIMERS ---
    if (this.oneTwoTimer > 0) { this.oneTwoTimer -= dt; if (this.oneTwoTimer <= 0) this.oneTwoPartner = null; }
    if (this.holdTimer > 0) { this.holdTimer -= dt; if (this.holdTimer <= 0) this.isHolding = false; }
    if (this.thirdManTimer > 0) { this.thirdManTimer -= dt; if (this.thirdManTimer <= 0) this.thirdManTarget = null; }

    // Continuously track incoming pass every frame (not just on decision ticks)
    const ball = game.ball;
    if (this.action==='receive' && !ball.owner && ball.vel.len()>3 &&
        ball.lastKicker && ball.lastKicker.team===this.team && !this.hasBall) {
      const spd=ball.vel.len();
      const stopPos=ballPredictPos(ball, spd/FRICTION);
      const d=ptSegDist(this.pos, ball.pos, stopPos);
      if (d < 10) {
        const mySpd=this.role===R.GK?SPD_GK:this.maxSpd*(1+upg(this,'speed')*0.09);
        const meetTime=Math.max(0.05, this.pos.dist(ball.pos)/(spd+mySpd));
        this.targetPos=ballPredictPos(ball, meetTime);
        if (this.dtimer<=0) this.dtimer=0.15; // suppress decision override
      }
    }

    // Force re-decide on important events
    if (!ball.owner && !this.hasBall && ball.vel.len() > 2) {
      const d = this.pos.dist(ball.pos);
      if (d < 20 && this.dtimer > 0.15) this.dtimer = 0.05;
    }

    if (this.dtimer <= 0) {
      if (humanControl.isControlled(this) && game.state === ST.PLAY) {
        this.dtimer = 0.05;
      } else {
        this.decide(game);
        let interval = this.hasBall ? DT_BALL :
          (game.teamWithBall()===this.team ? DT_OFF : DT_DEF);

        // --- TEMPO VARIATION ---
        if (this.hasBall || game.teamWithBall()===this.team) {
          const bProg = game.ballProg(this.team);
          const sd = game.scoreDiff(this.team);
          const tLeft = game.timeLeft();
          if (game.isCounter(this.team)) interval *= TEMPO_COUNTER;
          else if (bProg < BUILDUP_X) interval *= TEMPO_BUILDUP;
          else if (bProg > 0.65) interval *= TEMPO_FINAL_THIRD;
          if (sd > 0 && tLeft < HALF_DUR * 0.5) interval *= TEMPO_WINNING_LATE;
        }

        this.dtimer = interval * (0.8 + Math.random()*0.4);
      }
    }

    const staminaSpeedFactor = lerp(STAMINA_MIN_SPD, 1.0, this.stamina);
    const spdLv = this.role!==R.GK ? upg(this, 'speed') : 0;
    const spdMul = 1 + spdLv*0.15;
    if (this.role===R.GK) {
      this.updateGK(dt, game);
    } else if (humanControl.isControlled(this) && game.state === ST.PLAY) {
      const dir = humanControl.getDirection();
      this.action = this.hasBall ? 'dribble' : 'move';
      if (dir) {
        const spd = (this.hasBall ? SPD_DRIBBLE : this.maxSpd) * staminaSpeedFactor * spdMul;
        this.targetPos = this.pos.add(dir.mul(5));
        this.moveToward(this.targetPos, spd, dt);
        this.facing = dir;
      } else {
        this.vel = this.vel.mul(Math.pow(0.01, dt));
        this.pos = this.pos.add(this.vel.mul(dt));
      }
    } else if (this.targetPos) {
      const baseSpd = this.hasBall ? SPD_DRIBBLE : this.maxSpd;
      let spd = baseSpd * staminaSpeedFactor * spdMul;
      // Defensive transition: urgency boost
      if (!this.hasBall && game.isDefTransition(this.team) && this.action==='defend') {
        spd *= DEF_TRANSITION_DROP_SPD;
      }
      this.moveToward(this.targetPos, spd, dt);
    }

    // --- PHYSICAL SEPARATION: push apart overlapping teammates ---
    const sepR = PLAYER_R * 3.5; // start pushing within ~3.2m
    for (const t of this.team.players) {
      if (t === this) continue;
      const d = this.pos.dist(t.pos);
      if (d < sepR && d > 0.01) {
        const overlap = sepR - d;
        const push = this.pos.sub(t.pos).norm().mul(overlap * 0.4 * dt * 60);
        this.pos = this.pos.add(push);
      }
    }

    this.pos.x = clamp(this.pos.x, 0.5, PW-0.5);
    this.pos.y = clamp(this.pos.y, 0.5, PH-0.5);
  }

  updateGK(dt, game) {
    if (this.hasBall) {
      if (this.kickCD<=0) this.gkDistribute(game);
      return;
    }
    const ball = game.ball;
    const gc = this.defGoal();
    const gkSpd = SPD_GK * lerp(STAMINA_MIN_SPD, 1.0, this.stamina);

    // Position between ball and goal
    const toBall = ball.pos.sub(gc);
    const dist = toBall.len();
    let pd = clamp(dist*0.12, 1.5, 8);
    let tgt = gc.add(toBall.norm().mul(pd));
    tgt.y = clamp(tgt.y, PH/2-GOAL_W/2-2, PH/2+GOAL_W/2+2);
    if (this.team.atkDir>0) tgt.x=clamp(tgt.x,0.5,14); else tgt.x=clamp(tgt.x,PW-14,PW-0.5);

    // Rush out for 1v1
    if (this.shouldRush(game)) {
      this.moveToward(ball.pos, gkSpd+1.5, dt);
      return;
    }

    // Dive toward incoming shot
    if (!ball.owner && ball.vel.len() > 10) {
      const goalX = gc.x;
      const timeToGoal = Math.abs(goalX - ball.pos.x) / Math.max(Math.abs(ball.vel.x), 0.1);
      if (timeToGoal < 1.0 && timeToGoal > 0) {
        const predictY = ball.pos.y + ball.vel.y * timeToGoal;
        if (predictY > PH/2-GOAL_W/2-1 && predictY < PH/2+GOAL_W/2+1) {
          const diveTarget = new V(goalX + (this.team.atkDir>0 ? 1 : -1), clamp(predictY, PH/2-GOAL_W/2, PH/2+GOAL_W/2));
          this.moveToward(diveTarget, gkSpd+3, dt);
          return;
        }
      }
    }

    this.moveToward(tgt, gkSpd, dt);
  }

  shouldRush(game) {
    const ball = game.ball;
    if (!ball.owner || ball.owner.team === this.team) return false;
    const d = this.pos.dist(ball.pos);
    const dg = ball.pos.dist(this.defGoal());
    if (dg > 22 || d > 18) return false;
    // Check no defenders between attacker and goal
    const defs = this.team.players.filter(p=>p!==this&&p.role===R.DEF);
    const atk = ball.owner;
    for (const def of defs) {
      if (this.team.atkDir > 0) { if (def.pos.x < atk.pos.x && def.pos.dist(atk.pos)<8) return false; }
      else { if (def.pos.x > atk.pos.x && def.pos.dist(atk.pos)<8) return false; }
    }
    return true;
  }

  gkDistribute(game) {
    const tms = this.team.players.filter(p=>p!==this);
    const opps = game.getOpps(this.team);
    let best=null, bs=-Infinity, goShort=false;

    // === SHORT OPTION: play from back to unmarked defenders/midfielders ===
    for (const t of tms) {
      if(t.role!==R.DEF && t.role!==R.MID) continue;
      const d=this.pos.dist(t.pos);
      if(d<5||d>25) continue;
      const nearOpp=this.oppDist(t.pos, game);
      if(nearOpp<6) continue; // too marked
      // Check pass lane
      let clear=true;
      for(const o of opps) if(ptSegDist(o.pos,this.pos,t.pos)<2.5){clear=false;break;}
      if(!clear) continue;

      let s = 10;
      s += nearOpp*1.5;
      if(t.role===R.DEF) s += 3; // prefer CBs for building
      s -= d*0.2;
      if(s>bs){bs=s;best=t;goShort=true;}
    }

    // === LONG OPTION: traditional distribution ===
    for (const t of tms) {
      const d=this.pos.dist(t.pos);
      if (d<8||d>55) continue;
      let s = 0;
      if (t.role===R.FWD) s+=12;
      if (t.role===R.MID) s+=8;
      s += this.oppDist(t.pos, game)*1.5;
      const fwd = this.team.atkDir>0 ? t.pos.x-this.pos.x : this.pos.x-t.pos.x;
      s += fwd*0.3;
      s -= d*0.1;
      if (s>bs){bs=s;best=t;goShort=false;}
    }

    if (best) {
      const d=this.pos.dist(best.pos);
      if(goShort){
        // Short ground pass to defender
        const pwr=clamp(d*0.5+4, 8, 14);
        const lead=best.vel.mul(d/pwr*0.3);
        game.ball.kick(best.pos.add(lead).sub(this.pos), pwr, 0);
      } else {
        // Long lofted distribution
        const pwr=clamp(d*0.5+8, PASS_LO, 20);
        const lead=best.vel.mul(d/pwr*0.3);
        const flightTime = d / pwr;
        const loft = 0.5 * GRAVITY * flightTime + rand(1, 3);
        game.ball.kick(best.pos.add(lead).sub(this.pos), pwr, loft);
      }
      this.hasBall=false;
      game.ball.lastOwner=this;
      game.ball.lastKicker=this;
      this.kickCD=0.5;
    }
  }

  oppDist(pos,game){
    let m=Infinity;
    for(const o of game.getOpps(this.team)){const d=o.pos.dist(pos);if(d<m)m=d;}
    return m;
  }

  decide(game) {
    if (this.role===R.GK) return;
    const ball = game.ball;

    // PRIORITY 1: Chase free ball if I'm closest on my team
    if (!ball.owner && this.shouldChaseBall(game)) {
      const pred = ballPredictPos(ball, this.pos.dist(ball.pos)/this.maxSpd);
      this.targetPos = pred;
      this.action = 'chase';
      return;
    }

    // PRIORITY 2: Move to receive incoming ball
    if (!ball.owner && ball.vel.len()>3 && ball.lastKicker && ball.lastKicker.team===this.team) {
      if (this.shouldReceive(game)) {
        return; // targetPos set in shouldReceive
      }
    }

    if (this.hasBall) {
      this.decideWithBall(game);
    } else if (game.teamWithBall()===this.team) {
      this.decideAttackOff(game);
    } else {
      this.decideDefend(game);
    }
  }

  shouldChaseBall(game) {
    const ball = game.ball;
    const d = this.pos.dist(ball.pos);
    if (d > 25) return false;

    // How many teammates are closer?
    let closer = 0;
    for (const p of this.team.players) {
      if (p===this || p.role===R.GK) continue;
      if (p.pos.dist(ball.pos) < d - 1) closer++;
    }

    // The closest 1-2 players chase
    if (closer >= 2) return false;

    // Don't chase if an opponent already has it firmly
    if (ball.owner && ball.owner.team !== this.team) return false;

    // Chase free balls
    if (!ball.owner) return true;
    return false;
  }

  shouldReceive(game) {
    const ball = game.ball;
    const spd = ball.vel.len();
    if (spd < 2) return false;

    // Predict where ball will stop
    const stopTime = spd / FRICTION;
    const stopPos = ballPredictPos(ball, stopTime);

    // Am I near the ball's path?
    const d = ptSegDist(this.pos, ball.pos, stopPos);
    if (d > 8) return false;

    // Am I the closest teammate to the ball's path?
    let closest = true;
    for (const p of this.team.players) {
      if (p===this || p.role===R.GK) continue;
      if (ptSegDist(p.pos, ball.pos, stopPos) < d - 1) { closest = false; break; }
    }
    if (!closest) return false;

    // Run TOWARD the ball aggressively - calculate convergence point
    const distToBall = this.pos.dist(ball.pos);
    const mySpd = this.role === R.GK ? SPD_GK : this.maxSpd;
    const meetTime = Math.max(0.05, distToBall / (spd + mySpd));
    const meetPos = ballPredictPos(ball, meetTime);
    this.targetPos = meetPos;
    this.action = 'receive';
    return true;
  }

  decideWithBall(game) {
    const goalPos = this.atkGoal();
    const distGoal = this.distAtkGoal();
    const bProg = game.ballProg(this.team);
    const isCounter = game.isCounter(this.team);
    const sd = game.scoreDiff(this.team);
    const tLeft = game.timeLeft();

    const fatiguNoise = lerp(1.8, 1.0, this.stamina);
    let shootS = this.evalShoot(game) + rand(-3,3) * fatiguNoise;
    let {target:passT, score:passS, aimPos:passAim} = this.evalPass(game);
    passS += rand(-2,2) * fatiguNoise;
    let {target:dribT, score:dribS} = this.evalDribble(game);
    dribS += rand(-3,3) * fatiguNoise;

    // === TACTICAL ADJUSTMENTS ===

    // Build-up play: in own third, prefer safe passes, avoid risky dribbles/shots
    if (bProg < BUILDUP_X) {
      shootS -= 15;
      dribS -= 5;
      passS += 4; // prefer passing out from back
    }

    // Counter-attack: favor forward actions, be more direct
    if (isCounter) {
      shootS += 4;
      if (passAim) passS += 6; // through balls extra valuable
      dribS += (this.role===R.FWD ? 5 : 2);
    }

    // Game state: losing late → take more risks
    if (sd < 0 && tLeft < HALF_DUR * 0.5) {
      shootS += 5 + (-sd)*2;
      dribS += 3;
    }
    // Winning late → play safer, keep possession
    if (sd > 0 && tLeft < HALF_DUR * 0.5) {
      passS += 5;
      shootS -= 4;
      dribS -= 3;
    }

    const shootThresh = this.role===R.FWD ? 6 : 12;
    if (shootS > passS && shootS > dribS && shootS > shootThresh) {
      this.shoot(game);
    } else if (passS > dribS && passT && passS > 3) {
      this.pass(passT, game, passAim);
    } else if (dribT && dribS > -5) {
      this.targetPos = dribT;
      this.action = 'dribble';
    } else if (passT) {
      this.pass(passT, game, passAim);
    } else {
      // === HOLD/SHIELD BEHAVIOR ===
      const bestActionScore = Math.max(shootS, passS, dribS);
      const nearOppHold = this.oppDist(this.pos, game);
      if (bestActionScore < HOLD_THRESHOLD && nearOppHold < SHIELD_OPP_RANGE && !this.isHolding) {
        const nearestOpp = game.getOpps(this.team)
          .reduce((a, b) => a.pos.dist(this.pos) < b.pos.dist(this.pos) ? a : b);
        const awayDir = this.pos.sub(nearestOpp.pos).norm();
        this.facing = awayDir;
        this.targetPos = this.pos.add(awayDir.mul(0.5));
        this.action = 'dribble';
        this.isHolding = true;
        this.holdTimer = HOLD_DURATION;
        this.dtimer = HOLD_DURATION;
      } else {
        // Dribble toward goal
        const d = goalPos.sub(this.pos).norm().mul(5);
        this.targetPos = this.pos.add(d);
        this.action = 'dribble';
        this.isHolding = false;
      }
    }
  }

  evalShoot(game) {
    const gp = this.atkGoal();
    const d = this.distAtkGoal();
    if (d > 30) return -50;

    const gt = new V(gp.x, PH/2-GOAL_W/2), gb = new V(gp.x, PH/2+GOAL_W/2);
    const a1=Math.atan2(gt.y-this.pos.y, gt.x-this.pos.x);
    const a2=Math.atan2(gb.y-this.pos.y, gb.x-this.pos.x);
    let ang=Math.abs(a2-a1); if(ang>Math.PI) ang=2*Math.PI-ang;

    let s = 35 - d*1.3 + ang*25;

    // Shooting lane blocked?
    for (const o of game.getOpps(this.team)) {
      if(o.role===R.GK) continue;
      if(ptSegDist(o.pos, this.pos, gp) < 2.5) s -= 10;
    }

    // Central bonus
    s += (1 - Math.abs(this.pos.y-PH/2)/(PH/2)) * 6;

    // Forwards are more clinical
    if(this.role===R.FWD) s += 6;

    // Big bonus inside the box
    const boxX = this.team.atkDir>0 ? this.pos.x > PW-PENALTY_D : this.pos.x < PENALTY_D;
    const boxY = this.pos.y > (PH-PENALTY_W)/2 && this.pos.y < (PH+PENALTY_W)/2;
    if(boxX && boxY) s += 10;

    return s;
  }

  evalPass(game) {
    const opps = game.getOpps(this.team);
    let best=null, bs=-Infinity, bestAim=null;
    const isCounter = game.isCounter(this.team);
    const bProg = game.ballProg(this.team);

    const candidates = this.team.players.filter(p=>p!==this);
    for (const t of candidates) {
      const d=this.pos.dist(t.pos);
      if(d<4||d>48) continue;

      let s=0;

      // Anti ping-pong (reduced during give-and-go)
      if(game.ball.lastKicker===t) {
        s -= (t.oneTwoTimer > 0 && t.oneTwoPartner === this) ? 5 : 15;
      }
      // Give-and-go return bonus
      if(t.oneTwoTimer > 0 && t.oneTwoPartner === this) s += ONE_TWO_BONUS;

      // Passing lane
      let blocked=false;
      for(const o of opps){
        const pd=ptSegDist(o.pos, this.pos, t.pos);
        if(pd<1.5){blocked=true; s-=20;}
        else if(pd<3) s-=8;
      }

      // Forward pass bonus (boosted in counter)
      const fwd = this.team.atkDir>0 ? t.pos.x-this.pos.x : this.pos.x-t.pos.x;
      s += fwd * (isCounter ? 1.4 : 1.0);

      // Distance to goal bonus
      const tg = t.pos.dist(this.atkGoal());
      s += (55-tg)*0.3;

      // Space around target (capped to avoid defenders always winning)
      let nearOpp=Infinity;
      for(const o of opps) nearOpp=Math.min(nearOpp, o.pos.dist(t.pos));
      s += Math.min(nearOpp, 8) * 1.5;

      // Long pass risk (reduced in counter)
      if(d>35) s -= (d-35)*(isCounter ? 0.3 : 0.6);

      // Cross from wing
      if(this.isWide() && this.nearOppBox()) {
        if(t.role===R.FWD && tg<22) s += 10;
      }

      // Backward pass penalty — scales with how far back and how advanced we are
      if(fwd < 0) {
        const backPen = bProg < BUILDUP_X ? 0.3 : (bProg > 0.6 ? 1.2 : 0.6);
        s -= Math.abs(fwd) * backPen;
      }

      // Build-up: prefer short safe passes in own third
      if(bProg < BUILDUP_X && d < 20 && nearOpp > 5) s += 6;

      // Don't pass to GK unless desperate
      if(t.role===R.GK) s -= 15;

      if(s>bs){bs=s;best=t;bestAim=null;}
    }

    // === THROUGH BALLS ===
    for (const t of candidates) {
      if(t.role===R.GK) continue;
      const d=this.pos.dist(t.pos);
      if(d<8||d>45) continue;

      // Where would teammate run to?
      const runDir = this.atkGoal().sub(t.pos).norm();
      const runDist = 6 + (isCounter ? 4 : 0);
      const spacePos = t.pos.add(runDir.mul(runDist));

      // Must be on the pitch
      if(spacePos.x<3||spacePos.x>PW-3||spacePos.y<3||spacePos.y>PH-3) continue;

      // Must be onside (or close to it)
      if(!this.isOnside(spacePos, game)) continue;

      // Check the pass lane to the space
      let tbBlocked=false;
      for(const o of opps){
        if(ptSegDist(o.pos, this.pos, spacePos)<2.5){ tbBlocked=true; break; }
      }
      if(tbBlocked) continue;

      // Check that space is actually behind defenders
      let defsBehind=0;
      for(const o of opps){
        if(o.role===R.GK) continue;
        const oFwd = this.team.atkDir>0 ? o.pos.x : PW-o.pos.x;
        const sFwd = this.team.atkDir>0 ? spacePos.x : PW-spacePos.x;
        if(sFwd > oFwd-2) defsBehind++;
      }
      if(defsBehind<2) continue; // need to beat at least 2 defenders

      let s = THROUGH_BONUS;
      s += (55 - spacePos.dist(this.atkGoal())) * 0.3;
      if(isCounter) s += 8;
      // Bonus if teammate is already moving forward
      const tVelFwd = this.team.atkDir>0 ? t.vel.x : -t.vel.x;
      if(tVelFwd>1) s += 5;
      if(t.role===R.FWD) s += 4;
      if(game.ball.lastKicker===t) s -= 15;

      if(s>bs){bs=s;best=t;bestAim=spacePos;}
    }

    // === SWITCH PLAY (long diagonal to open wing) ===
    const ballSide = game.ball.pos.y < PH/2 ? -1 : 1; // -1=top, 1=bottom
    for (const t of candidates) {
      if(t.role===R.GK) continue;
      const d=this.pos.dist(t.pos);
      if(d<20||d>55) continue;
      // Is target on the opposite side?
      const tSide = t.pos.y < PH/2 ? -1 : 1;
      if(tSide===ballSide) continue;
      // Is the opposite side open?
      let nearOpp=Infinity;
      for(const o of opps) nearOpp=Math.min(nearOpp, o.pos.dist(t.pos));
      if(nearOpp<6) continue;
      // Is the diagonal lane clear?
      let laneBlocked=false;
      for(const o of opps){
        if(ptSegDist(o.pos, this.pos, t.pos)<3){laneBlocked=true;break;}
      }
      if(laneBlocked) continue;

      let s = SWITCH_BONUS;
      s += nearOpp*1.5;
      const fwd = this.team.atkDir>0 ? t.pos.x-this.pos.x : this.pos.x-t.pos.x;
      s += fwd*0.4;
      if(game.ball.lastKicker===t) s -= 15;

      if(s>bs){bs=s;best=t;bestAim=null;}
    }

    // Under pressure? consider safe back pass
    const nearOppMe = this.oppDist(this.pos, game);
    if (nearOppMe < 4 && bs < 8) {
      for (const t of this.team.players.filter(p=>p!==this&&(p.role===R.DEF||p.role===R.GK))) {
        const d=this.pos.dist(t.pos);
        if(d<4||d>40) continue;
        let s=-3;
        let clear=true;
        for(const o of opps) if(ptSegDist(o.pos,this.pos,t.pos)<2) clear=false;
        if(!clear) continue;
        s += this.oppDist(t.pos,game)*1.5;
        if(s>bs){bs=s;best=t;bestAim=null;}
      }
    }

    return {target:best, score:bs, aimPos:bestAim};
  }

  evalDribble(game) {
    const gp = this.atkGoal();
    const toGoal = gp.sub(this.pos).norm();
    const opps = game.getOpps(this.team);
    const perp = new V(-toGoal.y, toGoal.x);

    // 7 dribble directions: forward, slight angles, wide angles, cut inside, sideways
    let bestTarget=null, bestScore=-Infinity;
    const dirs = [
      toGoal,                                                    // straight at goal
      toGoal.add(perp.mul(0.3)).norm(),                          // slight left
      toGoal.add(perp.mul(-0.3)).norm(),                         // slight right
      toGoal.add(perp.mul(0.7)).norm(),                          // wide left
      toGoal.add(perp.mul(-0.7)).norm(),                         // wide right
      perp,                                                      // pure sideways left
      perp.mul(-1),                                              // pure sideways right
    ];

    // Winger cut-inside direction
    if(this.isWide()){
      const inside = new V(this.team.atkDir, this.pos.y<PH/2 ? 1 : -1).norm();
      dirs.push(inside);
    }

    for (const dir of dirs) {
      const target = this.pos.add(dir.mul(7));
      if(target.x<2||target.x>PW-2||target.y<2||target.y>PH-2) continue;

      let s=0;
      let minOppD=Infinity;
      for(const o of opps){
        const od=o.pos.dist(target);
        minOppD=Math.min(minOppD,od);
        if(ptSegDist(o.pos, this.pos, target)<2) s-=12;
      }
      s += minOppD*1.8 - 8;

      if(this.inOwnHalf()) s -= 8;
      if(this.role===R.FWD) s += 4;
      if(this.oppDist(this.pos,game)<3) s -= 12;

      // Forward progress
      const fwd = this.team.atkDir>0 ? target.x-this.pos.x : this.pos.x-target.x;
      s += fwd*0.5;

      // Cut inside bonus: approaching central area from wing = dangerous
      if(this.isWide() && Math.abs(target.y-PH/2) < Math.abs(this.pos.y-PH/2)){
        if(target.dist(gp)<30) s += 4;
      }

      // Counter-attack: boost forward dribbles
      if(game.isCounter(this.team) && fwd>3) s += 5;

      if(s>bestScore){bestScore=s;bestTarget=target;}
    }

    return {target:bestTarget, score:bestScore};
  }

  shoot(game, charge) {
    const gp=this.atkGoal();
    const ty=PH/2+rand(-GOAL_W/2+0.5, GOAL_W/2-0.5);
    const tgt=new V(gp.x,ty);
    const dir=tgt.sub(this.pos);
    const d=dir.len();
    // charge: 0=weak tap, 1=full power. undefined=AI default
    const ch = charge !== undefined ? charge : clamp((d-5)/30, 0.3, 0.85);
    const pwr=clamp(lerp(8, 50, ch), 8, 50);
    // More inaccuracy at extremes (too weak or overcharged)
    const accPenalty = ch > 0.9 ? (ch-0.9)*3 : 0;
    const shotLv = upg(this, 'shot');
    const inaccMul = (1 - shotLv*0.18) / this.wcStr;
    const pwrUpg = (1 + shotLv*0.11) * this.wcStr;
    const inacc=rand(-0.05-accPenalty,0.05+accPenalty)*d/15*inaccMul;
    // Higher loft when overcharged
    let loft = rand(0, 1.5) + (ch > 0.85 ? (ch-0.85)*8 : 0);
    if (d < 15 && Math.random() < 0.12) loft = rand(3, 5); // chip
    game.ball.kick(dir.norm().add(new V(0,inacc)), pwr*pwrUpg, loft);
    this.hasBall=false;
    game.ball.lastOwner=this; game.ball.lastKicker=this;
    this.kickCD=0.4;
    game.addEvent(`Shot: ${game.pStr(this)}`);
  }

  pass(target, game, aimPos) {
    const aim0 = aimPos || target.pos;
    const d=this.pos.dist(aim0);
    const pwr=clamp(PASS_LO+d*0.4, PASS_LO, PASS_HI);
    const lead = aimPos ? new V() : target.vel.mul(d/pwr*0.5); // no lead for through balls (already aimed ahead)
    const finalAim=aim0.add(lead);
    const passPwr = clamp(PASS_LO+d*0.4, PASS_LO, PASS_HI);
    const inacc=rand(-0.03,0.03)*Math.min(d/25,1);
    const dir=finalAim.sub(this.pos).norm().add(new V(inacc,inacc));
    // Loft long passes and crosses
    let loft = 0;
    if (d > LOFT_DIST || (this.isWide() && this.nearOppBox() && target.role===R.FWD)) {
      const flightTime = d / passPwr;
      loft = 0.5 * GRAVITY * flightTime + rand(0, 2); // arc over defenders
    }
    // Through balls: slight loft to clear defenders
    if (aimPos && d > 12) {
      const flightTime = d / passPwr;
      loft = Math.max(loft, 0.5 * GRAVITY * flightTime * 0.6 + rand(0, 1));
    }
    game.ball.kick(dir, passPwr, loft);

    // === GIVE-AND-GO TRIGGER ===
    if (!aimPos && (this.role===R.MID || this.role===R.FWD) && (!this.inOwnHalf())) {
      if (Math.random() < ONE_TWO_CHANCE) {
        this.oneTwoTimer = ONE_TWO_DURATION;
        this.oneTwoPartner = target;
      }
    }

    // === THIRD-MAN RUN TRIGGER ===
    if (Math.random() < THIRD_MAN_CHANCE) {
      const candidates = this.team.players.filter(p =>
        p !== this && p !== target && p.role !== R.GK && p.role !== R.DEF &&
        p.pos.dist(target.pos) < 25 && p.pos.dist(target.pos) > 6
      );
      if (candidates.length > 0) {
        const runner = candidates.reduce((best, p) => {
          const fwd = this.team.atkDir > 0 ? p.pos.x : PW - p.pos.x;
          const bfwd = this.team.atkDir > 0 ? best.pos.x : PW - best.pos.x;
          return fwd > bfwd ? p : best;
        });
        const runDir = this.atkGoal().sub(runner.pos).norm();
        const runTarget = runner.pos.add(runDir.mul(THIRD_MAN_RUN_DIST));
        if (runner.isOnside(runTarget, game)) {
          runner.thirdManTimer = 2.5;
          runner.thirdManTarget = new V(clamp(runTarget.x,3,PW-3), clamp(runTarget.y,3,PH-3));
        }
      }
    }

    this.hasBall=false;
    game.ball.lastOwner=this; game.ball.lastKicker=this;
    this.kickCD=0.3;
  }

  isWide(){return this.pos.y<14||this.pos.y>PH-14;}
  nearOppBox(){return Math.abs(this.pos.x-this.atkGoal().x)<25;}

  offsideLine(game){
    const opps=game.getOpps(this.team);
    // Sort by distance to opponent's goal line (the end we attack)
    const sorted=this.team.atkDir>0
      ? [...opps].sort((a,b)=>b.pos.x-a.pos.x)
      : [...opps].sort((a,b)=>a.pos.x-b.pos.x);
    // Offside = second-to-last opponent (GK is usually last)
    const idx=Math.min(1,sorted.length-1);
    return sorted[idx].pos.x;
  }

  isOnside(pos, game){
    const line=this.offsideLine(game);
    if(this.team.atkDir>0) return pos.x <= line+OFFSIDE_BUF;
    return pos.x >= line-OFFSIDE_BUF;
  }

  decideAttackOff(game) {
    const ball = game.ball;
    const base = this.basePosition(ball, true);
    const opps = game.getOpps(this.team);
    const isCounter = game.isCounter(this.team);
    let target = base.clone();

    // === GIVE-AND-GO: sprint forward after passing ===
    if (this.oneTwoTimer > 0 && this.oneTwoPartner) {
      const partner = this.oneTwoPartner;
      const aheadDist = 8 + (this.oneTwoTimer / ONE_TWO_DURATION) * 6;
      const runTarget = partner.pos.add(this.atkGoal().sub(partner.pos).norm().mul(aheadDist));
      if (this.isOnside(runTarget, game)) {
        this.targetPos = new V(clamp(runTarget.x,3,PW-3), clamp(runTarget.y,3,PH-3));
        this.action = 'move';
        return;
      }
    }

    // === THIRD-MAN RUN: override positioning if active ===
    if (this.thirdManTimer > 0 && this.thirdManTarget) {
      if (this.isOnside(this.thirdManTarget, game)) {
        this.targetPos = this.thirdManTarget;
        this.action = 'move';
        return;
      } else {
        this.thirdManTimer = 0; this.thirdManTarget = null;
      }
    }

    // Forwards: aggressive attacking movement
    if (this.role===R.FWD) {
      const gp = this.atkGoal();
      const ballInFinalThird = this.team.atkDir>0 ? ball.pos.x>PW*0.65 : ball.pos.x<PW*0.35;
      const run = this.findRun(game);

      if (run) {
        target = run;
      } else if (ballInFinalThird) {
        const penX = this.team.atkDir>0 ? PW-PENALTY_SPOT : PENALTY_SPOT;
        const side = this.formPos.y<0.5 ? -1 : 1;
        const penY = PH/2 + side * rand(2, GOAL_W/2+4);
        target = new V(penX, penY);
        const nearDef = this.oppDist(target, game);
        if (nearDef < 3) {
          target.y += rand(-5, 5);
          target.y = clamp(target.y, 8, PH-8);
        }
      } else if (isCounter) {
        const ahead = this.team.atkDir>0 ? Math.min(this.pos.x+20, PW-10) : Math.max(this.pos.x-20, 10);
        target = new V(ahead, this.pos.y + rand(-5,5));
      } else {
        // === FORWARD SUPPORT ANGLE ===
        const bd = this.pos.dist(ball.pos);
        const carrier = ball.owner;
        if (carrier && carrier.team===this.team && carrier!==this && bd > 10 && bd < 30) {
          const toGoal = this.atkGoal().sub(carrier.pos).norm();
          const perp = new V(-toGoal.y, toGoal.x);
          const side = this.formPos.y < 0.5 ? -1 : 1;
          const supportDist = rand(8, 14);
          const angle = toGoal.add(perp.mul(side * 0.5)).norm();
          target = carrier.pos.add(angle.mul(supportDist));
          target.x = clamp(target.x, 5, PW-5);
          target.y = clamp(target.y, 5, PH-5);
        } else if (bd > 15 && bd < 35) {
          const toBall = ball.pos.sub(this.pos).norm();
          const perp = new V(-toBall.y, toBall.x);
          target = base.add(perp.mul(this.formPos.y<0.5?-6:6)).add(toBall.mul(4));
        } else if (bd > 35) {
          target = target.add(ball.pos.sub(target).norm().mul(6));
        }
      }

      // === OFFSIDE AWARENESS: stay onside ===
      if (!this.isOnside(target, game)) {
        const line = this.offsideLine(game);
        if (this.team.atkDir>0) target.x = Math.min(target.x, line+OFFSIDE_BUF);
        else target.x = Math.max(target.x, line-OFFSIDE_BUF);
      }
    }

    // Midfielders: passing triangles & support angles
    if (this.role===R.MID) {
      const bd = this.pos.dist(ball.pos);
      const carrier = ball.owner;

      if (isCounter && bd < 30) {
        const ahead = this.team.atkDir>0 ? this.pos.x+12 : this.pos.x-12;
        target = new V(clamp(ahead,5,PW-5), this.pos.y);
      } else if (carrier && carrier.team===this.team && carrier!==this && bd < 30) {
        // === SUPPORT ANGLE: position at ~45 deg angle from carrier ===
        const toGoal = this.atkGoal().sub(carrier.pos).norm();
        const perp = new V(-toGoal.y, toGoal.x);
        const side = this.formPos.y < 0.5 ? -1 : 1;
        const supportDist = rand(10, 15);
        const angle = toGoal.add(perp.mul(side * 0.9)).norm();
        let supportPos = carrier.pos.add(angle.mul(supportDist));

        // Check if another teammate already near this support position
        let occupied = false;
        for (const tm of this.team.players) {
          if (tm===this || tm===carrier || tm.role===R.GK) continue;
          if (tm.pos.dist(supportPos) < 6) { occupied = true; break; }
        }
        if (occupied) {
          supportPos = carrier.pos.add(toGoal.add(perp.mul(-side * 0.9)).norm().mul(supportDist));
        }
        supportPos.x = clamp(supportPos.x, 3, PW-3);
        supportPos.y = clamp(supportPos.y, 3, PH-3);
        target = supportPos;
      } else if (bd > 8 && bd < 28) {
        const toBall = ball.pos.sub(this.pos).norm();
        const perp = new V(-toBall.y, toBall.x);
        const side = this.formPos.y<0.5 ? -1 : 1;
        target = base.add(perp.mul(side*5));
      }
      if (Math.abs(this.formPos.y-0.5)<0.2 && this.pos.dist(ball.pos)<25) {
        target = target.add(ball.pos.sub(target).norm().mul(3));
      }
    }

    // === OVERLAPPING FULLBACK RUNS ===
    if (this.role===R.DEF && (this.formPos.y<0.25||this.formPos.y>0.75)) {
      // Check if a winger/midfielder on our side has the ball
      const isLeft = this.formPos.y < 0.25;
      const carrier = ball.owner;
      if (carrier && carrier.team===this.team && carrier!==this) {
        const carrierWide = isLeft ? carrier.pos.y<PH*0.35 : carrier.pos.y>PH*0.65;
        const carrierInFront = this.team.atkDir>0
          ? carrier.pos.x > this.pos.x-5
          : carrier.pos.x < this.pos.x+5;
        if (carrierWide && carrierInFront) {
          // Overlap! Run beyond the ball carrier on the outside
          const overlapX = this.team.atkDir>0
            ? Math.min(carrier.pos.x+12, PW-8)
            : Math.max(carrier.pos.x-12, 8);
          const overlapY = isLeft ? clamp(carrier.pos.y-5, 2, PH*0.25) : clamp(carrier.pos.y+5, PH*0.75, PH-2);
          target = new V(overlapX, overlapY);
        } else {
          target.x += this.team.atkDir>0 ? 7 : -7;
        }
      } else {
        target.x += this.team.atkDir>0 ? 7 : -7;
      }
    }

    // Avoid clustering
    target = this.deCluster(target);
    target.x=clamp(target.x,2,PW-2); target.y=clamp(target.y,2,PH-2);
    this.targetPos=target;
    this.action='move';
  }

  findRun(game) {
    const opps = game.getOpps(this.team).filter(p=>p.role===R.DEF);
    if(opps.length<2) return null;
    const ball = game.ball;
    const gp = this.atkGoal();

    // Sort defenders by y position
    const sorted = [...opps].sort((a,b)=>a.pos.y-b.pos.y);
    let bestGap=null, bestS=0;
    for(let i=0;i<sorted.length-1;i++){
      const gap=sorted[i+1].pos.y-sorted[i].pos.y;
      if(gap>bestS && gap>7){
        const gy=(sorted[i].pos.y+sorted[i+1].pos.y)/2;
        const gx=(sorted[i].pos.x+sorted[i+1].pos.x)/2 + this.team.atkDir*4;
        bestS=gap;
        bestGap=new V(gx,gy);
      }
    }

    // Also check running behind the last defender
    const lastDef = this.team.atkDir>0 ?
      opps.reduce((a,b)=>a.pos.x>b.pos.x?a:b) :
      opps.reduce((a,b)=>a.pos.x<b.pos.x?a:b);
    const behindX = lastDef.pos.x + this.team.atkDir * 5;
    if (behindX > 5 && behindX < PW-5) {
      const behindGap = new V(behindX, this.pos.y);
      const d = this.pos.dist(behindGap);
      if (d < 20 && behindGap.dist(gp) < 35) {
        if (!bestGap || bestS < 10) { bestGap = behindGap; }
      }
    }

    if(bestGap && this.pos.dist(bestGap)<25 && bestGap.dist(gp)<40) return bestGap;
    return null;
  }

  deCluster(target) {
    const tms=this.team.players.filter(p=>p!==this&&p.role!==R.GK);
    let adj=new V();
    for(const t of tms){
      const d=target.dist(t.pos);
      if(d<10&&d>0.1){
        const strength = d < 4 ? 1.5 : 0.7; // much stronger push when very close
        adj=adj.add(target.sub(t.pos).norm().mul((10-d)*strength));
      }
    }
    return target.add(adj);
  }

  decideDefend(game) {
    const ball = game.ball;
    const base = this.basePosition(ball, false);
    const gp = this.defGoal();
    const opps = game.getOpps(this.team);
    let target = base.clone();
    const sd = game.scoreDiff(this.team);
    const tLeft = game.timeLeft();

    const dBall = this.pos.dist(ball.pos);
    const inDefTransition = game.isDefTransition(this.team);

    // Count teammates closer to ball
    let closer=0;
    for(const p of this.team.players){
      if(p===this||p.role===R.GK) continue;
      if(p.pos.dist(ball.pos)<dBall-1) closer++;
    }

    // === COORDINATED PRESSING ===
    let teammatePressing = false;
    for(const p of this.team.players){
      if(p===this||p.role===R.GK) continue;
      if(p.action==='defend' && p.pos.dist(ball.pos)<8 && this.pos.dist(p.pos)<PRESS_COORD_R){
        teammatePressing = true; break;
      }
    }

    const inMidfield = ball.pos.x > PW*0.25 && ball.pos.x < PW*0.75;
    const inOppHalf = game.ballProg(this.team) < 0.5;
    const pressRange = inDefTransition ? 30 : (teammatePressing ? 26 : (inMidfield ? 22 : 16));
    const maxPressers = inDefTransition ? 3 : (teammatePressing ? 3 : (inMidfield ? 3 : 2));
    const canPress = inDefTransition || this.role!==R.DEF || dBall<(inMidfield ? 16 : 10) || teammatePressing;

    // Losing late → more aggressive pressing
    const desperation = (sd<0 && tLeft<HALF_DUR*0.6) ? 1.3 : 1.0;

    if (closer<maxPressers && dBall<pressRange*desperation && canPress && ball.owner && ball.owner.team!==this.team) {
      const carrier = ball.owner;

      if(teammatePressing && closer>=1){
        // Support press: cut off nearest passing option instead of running at carrier
        let nearestOption=null, nearestD=Infinity;
        for(const t of carrier.team.players){
          if(t===carrier||t.role===R.GK) continue;
          const d=this.pos.dist(t.pos);
          if(d<nearestD && d<18){nearestD=d;nearestOption=t;}
        }
        if(nearestOption){
          // Position between carrier and their passing option
          const mid=carrier.pos.add(nearestOption.pos.sub(carrier.pos).mul(0.5));
          target=this.pos.add(mid.sub(this.pos).norm().mul(Math.min(5, mid.dist(this.pos))));
        } else {
          // No obvious option, close down space around carrier
          const directness = 0.5;
          const cutoffDir = gp.sub(carrier.pos).norm();
          const directDir = carrier.pos.sub(this.pos).norm();
          target = carrier.pos.add(cutoffDir.mul(1-directness).add(directDir.mul(-directness)).norm().mul(3));
        }
      } else {
        // Primary press: run at carrier
        const directness = inMidfield ? 0.7 : 0.3;
        const cutoffDir = gp.sub(carrier.pos).norm();
        const directDir = this.pos.sub(carrier.pos).norm().mul(-1);
        const pressDir = cutoffDir.mul(1-directness).add(directDir.mul(directness)).norm();
        target = carrier.pos.add(pressDir.mul(2));
      }
    } else {
      // Zone defense + marking
      let markTarget = null, markDist = 14;
      for (const o of opps) {
        if(o.role===R.GK) continue;
        const d = base.dist(o.pos);
        if(d < markDist) {
          markDist = d;
          markTarget = o;
        }
      }

      if (markTarget) {
        const goalside = gp.sub(markTarget.pos).norm().mul(2.5);
        target = markTarget.pos.add(goalside);
        if (target.dist(base) > 15) target = base.add(target.sub(base).norm().mul(12));
      }

      // === DEFENSIVE COMPACTNESS ===
      // Stay close to nearest teammate vertically (reduce gaps)
      if(this.role===R.DEF || this.role===R.MID){
        const tms=this.team.players.filter(p=>p!==this&&p.role===this.role);
        for(const t of tms){
          const gap=Math.abs(target.y-t.pos.y);
          if(gap>18){ // too far apart
            const toward = t.pos.y>target.y ? 2 : -2;
            target.y += toward;
          }
        }
      }

      // Defenders: maintain defensive line + offside trap
      if (this.role===R.DEF) {
        const line = this.defLine(game);
        if (this.team.atkDir>0) target.x = Math.min(target.x, line);
        else target.x = Math.max(target.x, line);

        // Offside trap: hold high line when winning and no immediate threat
        if(sd>0 && dBall>25){
          const highLine = this.team.atkDir>0 ? Math.min(line+3, PW/2-5) : Math.max(line-3, PW/2+5);
          if(this.team.atkDir>0) target.x = Math.min(target.x, highLine);
          else target.x = Math.max(target.x, highLine);
        }
      }

      // === DEFENSIVE TRANSITION: compact shape faster ===
      if (inDefTransition) {
        const defCenter = gp.add(ball.pos.sub(gp).norm().mul(15));
        target = target.add(defCenter.sub(target).mul(0.3));
        if (this.role===R.MID) {
          const dropX = this.team.atkDir>0
            ? Math.min(target.x, ball.pos.x-5)
            : Math.max(target.x, ball.pos.x+5);
          target.x = target.x*0.6 + dropX*0.4;
        }
      }
    }

    // Try to step into passing lanes
    if (ball.owner && ball.owner.team!==this.team && dBall < 18) {
      const carrier = ball.owner;
      for (const t of carrier.team.players) {
        if(t===carrier||t.role===R.GK) continue;
        const pd=ptSegDist(this.pos, carrier.pos, t.pos);
        if(pd<5 && this.pos.dist(carrier.pos) < t.pos.dist(carrier.pos)*0.8) {
          const mid = carrier.pos.add(t.pos.sub(carrier.pos).mul(0.4));
          const laneTarget = this.pos.add(mid.sub(this.pos).norm().mul(3));
          if(laneTarget.dist(base)<15) { target = laneTarget; }
          break;
        }
      }
    }

    // Avoid clustering (defenders too)
    target = this.deCluster(target);
    target.x=clamp(target.x,1,PW-1); target.y=clamp(target.y,1,PH-1);
    this.targetPos=target;
    this.action='defend';
  }

  defLine(game) {
    const ball = game.ball;
    if(this.team.atkDir>0) return clamp(ball.pos.x-12, 14, PW/2-3);
    return clamp(ball.pos.x+12, PW/2+3, PW-14);
  }
}

// ===================== TEAM =====================
class Team {
  constructor(name,color,colorDk,form,atkDir){
    this.name=name; this.color=color; this.colorDk=colorDk;
    this.atkDir=atkDir; this.score=0; this.players=[];
    for(let i=0;i<form.length;i++){
      const [r,fx,fy]=form[i];
      this.players.push(new Player(this, i+1, r, fx, fy));
    }
  }
  resetPositions(kickoff, hasKO){
    for(const p of this.players){
      let pos=this.f2w(p.formPos);
      if(kickoff){
        if(this.atkDir>0) pos.x=Math.min(pos.x,PW/2-2);
        else pos.x=Math.max(pos.x,PW/2+2);
        if(hasKO && p.role===R.FWD){
          pos=new V(PW/2+this.atkDir*1, PH/2+(p.formPos.y<0.5?-1.5:1.5));
        }
      }
      p.pos=pos; p.vel.set(0,0); p.hasBall=false;
      p.targetPos=pos.clone(); p.dtimer=rand(0.3,0.8);
      p.stamina=1.0; p.oneTwoTimer=0; p.oneTwoPartner=null;
      p.holdTimer=0; p.isHolding=false; p.thirdManTimer=0; p.thirdManTarget=null;
    }
  }
  f2w(fp){
    return new V(this.atkDir>0?fp.x*PW:(1-fp.x)*PW, fp.y*PH);
  }
  switchSides(){this.atkDir*=-1;}
}
